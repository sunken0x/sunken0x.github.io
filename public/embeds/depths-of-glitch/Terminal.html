        let base64OverlayBottom = ''; // This will be underneath with 1.0 opacity
        let overlayImageTop;
        let overlayImageBottom;

        // Grid settings
        let gridOffsetX = 0;
        let gridScrollSpeed = 0.8;
        let gridSpacing = 40;

        // Date settings
        let dateOffsetX = 0;
        let dateSpacing = 80;
        let currentDate = 1;

        // Line chart settings
        let centerX, centerY;
        let lineHistory = [];
        let maxHistoryLength = 200;
        let currentValue = 0.5;
        let trendDirection = 1;
        let lastTrendChange = 0;

        // Visual settings
        let chartColor = '#2ce1f5';
        let currentColor;
        let lastColorChangeTime = 0;
        let colorChangeInterval = 40;

        function preload() {
            if (base64OverlayTop && base64OverlayTop.length > 0) {
                overlayImageTop = loadImage(base64OverlayTop);
            }
            if (base64OverlayBottom && base64OverlayBottom.length > 0) {
                overlayImageBottom = loadImage(base64OverlayBottom);
            }
        }

        function setup() {
            let isFullscreen = windowWidth >= screen.width && windowHeight >= screen.height;
            canvasSize = isFullscreen ? 1000 : min(1000, min(windowWidth, windowHeight));
            let cnv = createCanvas(canvasSize, canvasSize);

            cnv.position(max(0, (windowWidth - canvasSize) / 2), max(0, (windowHeight - canvasSize) / 2));

            cnv.elt.style.border = 'none';
            cnv.elt.style.outline = 'none';
            cnv.elt.style.boxShadow = 'none';
            cnv.elt.style.margin = '0';
            cnv.elt.style.padding = '0';

            document.body.style.backgroundColor = '#000a25';
            document.body.style.margin = '0';
            document.body.style.padding = '0';
            document.body.style.overflow = 'hidden';
            
            // Also set html background
            document.documentElement.style.backgroundColor = '#000a25';
            document.documentElement.style.margin = '0';
            document.documentElement.style.padding = '0';

            imageMode(CENTER);

            centerX = canvasSize / 2;
            centerY = canvasSize / 2;

            for (let i = 0; i < maxHistoryLength; i++) {
                lineHistory[i] = 0.5;
            }

            currentColor = color(chartColor);
        }

        function draw() {
            // Fill entire canvas with background
            push();
            fill('#000a25');
            noStroke();
            rect(0, 0, width, height);
            pop();

            gridOffsetX -= gridScrollSpeed;
            dateOffsetX -= gridScrollSpeed;

            if (gridOffsetX <= -gridSpacing) {
                gridOffsetX = 0;
            }

            if (dateOffsetX <= -dateSpacing) {
                dateOffsetX = 0;
                currentDate++;
                if (currentDate > 20) currentDate = 1;
            }

            updateLineValue();

            let alpha = map(sin(frameCount * 0.1), -1, 1, 150, 255);
            currentColor = color(red(chartColor), green(chartColor), blue(chartColor), alpha);

            // Draw bottom overlay FIRST (behind chart)
            if (overlayImageBottom) {
                push();
                image(overlayImageBottom, width / 2, height / 2, canvasSize, canvasSize);
                pop();
            }

            // Then draw chart on top
            drawGrid();
            drawDates();
            drawChartDetails();

            if (frameCount % 9 < 6) {
                drawTrailingLine();
                drawTravelingPoint();
            }

            // Draw top overlay LAST (on top of everything else)
            if (overlayImageTop) {
                push();
                tint(255, 255 * 1); // 90% opacity
                image(overlayImageTop, width / 2, height / 2, canvasSize, canvasSize);
                pop();
            }
        }

        function updateLineValue() {
            let baseMovement = (noise(frameCount * 0.2) - 0.5) * 0.04;
            let dailyJitter = (noise(frameCount * 0.15) - 0.5) * 0.03;

            let stepDirection = noise(frameCount * 0.1);
            let stepNoise = 0;
            if (stepDirection > 0.65) {
                stepNoise = random(0.01, 0.03);

            let microMovement = (noise(frameCount * 0.3) - 0.5) * 0.02;
            let randomBump = random(-0.02, 0.02);

            let correctionChance = noise(frameCount * 0.02);
            let correctionNoise = 0;
            if (correctionChance < 0.05) {
                correctionNoise = random(-0.06, -0.03);
            } else if (correctionChance > 0.95) {
                correctionNoise = random(0.03, 0.06);
            }

            let tinyOscillation = sin(frameCount * 0.1) * 0.01;

            if (frameCount - lastTrendChange > random(200, 400)) {
                trendDirection *= -1;
                lastTrendChange = frameCount;
            }

            let trendAmount = trendDirection * 0.002;

            let movement = baseMovement + dailyJitter + stepNoise + microMovement +
                          randomBump + correctionNoise + tinyOscillation + trendAmount;

            currentValue += movement;
            currentValue = constrain(currentValue, 0.05, 0.95);

            lineHistory.unshift(currentValue);

            if (lineHistory.length > maxHistoryLength) {
                lineHistory.pop();
            }
        }

        function drawGrid() {
            stroke(50, 206, 245, 30);
            strokeWeight(1);

            for (let x = gridOffsetX; x < canvasSize + gridSpacing; x += gridSpacing) {
                line(x, margin, x, canvasSize - margin);
            }

            for (let y = margin; y < canvasSize - margin; y += gridSpacing) {
                line(0, y, canvasSize, y);
            }
        }

        function drawDates() {
            fill(chartColor);
            noStroke();
            textAlign(CENTER);
            textSize(12);

            for (let x = dateOffsetX; x < canvasSize + dateSpacing; x += dateSpacing) {
                let dateNum = ((currentDate + Math.floor((x - dateOffsetX) / dateSpacing)) % 20) || 20;
                text(dateNum, x, canvasSize - margin + 25);
            }
        }

        function drawChartDetails() {
            fill(chartColor);
            noStroke();
            textAlign(LEFT);

            let detailX = canvasSize - 200;
            let detailY = margin + 20;

            let displayValue = map(currentValue, 0, 1, 100, 500);
        }

        function drawTrailingLine() {
            stroke(chartColor);
            strokeWeight(2);
            noFill();

            beginShape();
            for (let i = 0; i < lineHistory.length - 1; i++) {
                let x = centerX - (i * 3);
                if (x < 0) break;

                let y = map(lineHistory[i], 0, 1, canvasSize - margin - 50, margin + 50);
                vertex(x, y);
            }
            endShape();
        }

        function drawTravelingPoint() {
            let currentY = map(currentValue, 0, 1, canvasSize - margin - 50, margin + 50);

            for (let r = 15; r > 0; r--) {
                let alpha = map(r, 0, 15, 255, 0);
                fill(red(chartColor), green(chartColor), blue(chartColor), alpha * 0.3);
                noStroke();
                ellipse(centerX, currentY, r, r);
            }

            fill(chartColor);
            stroke(255);
            strokeWeight(2);
            ellipse(centerX, currentY, 8, 8);
        }

        function windowResized() {
            let isFullscreen = windowWidth >= screen.width && windowHeight >= screen.height;
            let newCanvasSize = isFullscreen ? 1000 : min(1000, min(windowWidth, windowHeight));

            if (newCanvasSize !== canvasSize) {
                canvasSize = newCanvasSize;
                resizeCanvas(canvasSize, canvasSize);
                centerX = canvasSize / 2;
                centerY = canvasSize / 2;
            }

            select('canvas').position(max(0, (windowWidth - canvasSize) / 2), max(0, (windowHeight - canvasSize) / 2));
        }
    </script>
</body>
</html>
