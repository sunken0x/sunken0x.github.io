        // 3D Control variables
        let rotationX = 0;
        let rotationY = 23;
        let localZOffset = -15;

        init();
        animate();

        function init() {
            // Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(colors.background);
            
            // Camera setup
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 15);
            
            // Renderer setup
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(colors.background, 1);
            document.body.appendChild(renderer.domElement);
            
            // Main clock group
            clockGroup = new THREE.Group();
            scene.add(clockGroup);
            
            createHUDElements();
            createLoveHateText();
            setupOverlay();
            
            // Apply initial transform
            updateClockTransform();
            
            // Window resize listener
            window.addEventListener('resize', onWindowResize);
        }

        function updateClockTransform() {
            // Apply rotations
            clockGroup.rotation.x = (rotationX * Math.PI) / 180;
            clockGroup.rotation.y = (rotationY * Math.PI) / 180;
            
            // Calculate local Z movement based on current rotation
            // Create a vector pointing "forward" from the clock's perspective
            const forwardVector = new THREE.Vector3(0, 0, localZOffset);
            
            // Apply the same rotations to the movement vector
            forwardVector.applyEuler(new THREE.Euler(
                (rotationX * Math.PI) / 180,
                (rotationY * Math.PI) / 180,
                0,
                'XYZ'
            ));
            
            // Apply the transformed offset to the clock position
            clockGroup.position.copy(forwardVector);
            
            // Add the floating animation offset
            const elapsedTime = clock.getElapsedTime();
            clockGroup.position.y += Math.sin(elapsedTime * 1000 * 0.001) * 0.1;
        }

        function createHUDElements() {
            // Create clock hands
            createClockHands();
            
            // Create grid lines
            createGridLines();
            
            // Create additional HUD elements
            createHUDDetails();
        }

        function createClockHands() {
            // Hour hand (thick, short)
            const hourGeometry = new THREE.BoxGeometry(0.08, 3, 0.05);
            const hourMaterial = new THREE.MeshBasicMaterial({
                color: currentColor,
                transparent: true,
                opacity: 0.9
            });
            hourHand = new THREE.Mesh(hourGeometry, hourMaterial);
            hourHand.position.y = 1.5; // Offset to rotate from bottom
            
            const hourGroup = new THREE.Group();
            hourGroup.add(hourHand);
            clockGroup.add(hourGroup);
            hourHand.parent = hourGroup;

            // Minute hand (medium, longer)
            const minuteGeometry = new THREE.BoxGeometry(0.05, 4.5, 0.03);
            const minuteMaterial = new THREE.MeshBasicMaterial({
                color: currentColor,
                transparent: true,
                opacity: 0.8
            });
            minuteHand = new THREE.Mesh(minuteGeometry, minuteMaterial);
            minuteHand.position.y = 2.25; // Offset to rotate from bottom
            
            const minuteGroup = new THREE.Group();
            minuteGroup.add(minuteHand);
            clockGroup.add(minuteGroup);
            minuteHand.parent = minuteGroup;

            // Second hand (thin, longest)
            const secondGeometry = new THREE.BoxGeometry(0.02, 5.5, 0.02);
            const secondMaterial = new THREE.MeshBasicMaterial({
                color: colors.secondary,
                transparent: true,
                opacity: 0.9
            });
            secondHand = new THREE.Mesh(secondGeometry, secondMaterial);
            secondHand.position.y = 2.75; // Offset to rotate from bottom
            
            const secondGroup = new THREE.Group();
            secondGroup.add(secondHand);
            clockGroup.add(secondGroup);
            secondHand.parent = secondGroup;

            // Center dot
            const centerGeometry = new THREE.SphereGeometry(0.15, 16, 16);
            const centerMaterial = new THREE.MeshBasicMaterial({
                color: currentColor,
                transparent: true,
                opacity: 1
            });
            const centerDot = new THREE.Mesh(centerGeometry, centerMaterial);
            clockGroup.add(centerDot);
        }

        function createGridLines() {
            gridLines = new THREE.Group();
            
            // Vertical lines
            for (let i = -10; i <= 10; i += 0.5) {
                const geometry = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(i, -10, 0),
                    new THREE.Vector3(i, 10, 0)
                ]);
                const material = new THREE.LineBasicMaterial({
                    color: currentColor,
                    transparent: true,
                    opacity: 0.1 // Base opacity
                });
                const line = new THREE.Line(geometry, material);
                gridLines.add(line);
            }
            
            // Horizontal lines
            for (let i = -10; i <= 10; i += 0.5) {
                const geometry = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(-10, i, 0),
                    new THREE.Vector3(10, i, 0)
                ]);
                const material = new THREE.LineBasicMaterial({
                    color: currentColor,
                    transparent: true,
                    opacity: 0.1 // Base opacity
                });
                const line = new THREE.Line(geometry, material);
                gridLines.add(line);
            }
            
            clockGroup.add(gridLines);
        }

        function createHUDDetails() {
            // Corner brackets
            const bracketPositions = [
                { x: -9, y: 9 }, { x: 9, y: 9 },
                { x: -9, y: -9 }, { x: 9, y: -9 }
            ];
            
            bracketPositions.forEach(pos => {
                const bracket = createCornerBracket();
                bracket.position.set(pos.x, pos.y, 0);
                clockGroup.add(bracket);
            });
        }

        function createCornerBracket() {
            const group = new THREE.Group();
            
            // Horizontal line
            const hGeometry = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(-0.8, 0, 0),
                new THREE.Vector3(0, 0, 0)
            ]);
            const hMaterial = new THREE.LineBasicMaterial({
                color: currentColor,
                transparent: true,
                opacity: 0.6
            });
            const hLine = new THREE.Line(hGeometry, hMaterial);
            
            // Vertical line
            const vGeometry = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, -0.8, 0),
                new THREE.Vector3(0, 0, 0)
            ]);
            const vLine = new THREE.Line(vGeometry, hMaterial);
            
            group.add(hLine, vLine);
            return group;
        }

        function createLoveHateText() {
            // Create 3D text using canvas textures for each position
            for (let i = 0; i < 12; i++) {
                // Position like a clock: 12 o'clock is at the top (90 degrees), going clockwise
                const clockHour = i + 1; // 1-12 instead of 0-11
                const angle = ((clockHour - 3) / 12) * Math.PI * 2; // Start at 3 o'clock position, then rotate
                const radius = 6.5; // Distance from center
                
                // Create text as 3D geometry using canvas texture
                const textMesh = createTextMesh(loveHatePattern[i]);
                textMesh.position.x = Math.cos(angle) * radius;
                textMesh.position.y = Math.sin(angle) * radius;
                textMesh.position.z = 0;
                
                // Make text face the camera (no rotation needed for plane geometry)
                // The text should be readable when looking at the clock face
                
                clockGroup.add(textMesh);
                textElements.push({ textMesh: textMesh });
            }
        }

        function createTextMesh(text) {
            // Create canvas for text texture
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 512;
            canvas.height = 256;
            
            // Clear canvas with transparent background
            context.clearRect(0, 0, canvas.width, canvas.height);
            
            // Set font and text properties - much larger font
            context.font = 'bold 96px Courier New';
            context.fillStyle = currentColor;
            context.strokeStyle = currentColor;
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.letterSpacing = '8px';
            
            // Add stronger glow effect
            context.shadowColor = currentColor;
            context.shadowBlur = 25;
            
            // Draw text with outline for better visibility
            context.strokeText(text, canvas.width / 2, canvas.height / 2);
            context.fillText(text, canvas.width / 2, canvas.height / 2);
            
            // Create texture from canvas
            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            
            // Create material with the texture
            const material = new THREE.MeshBasicMaterial({
                map: texture,
                transparent: true,
                alphaTest: 0.1,
                side: THREE.DoubleSide,
                depthWrite: false
            });
            
            // Create much larger plane geometry for the text
            const geometry = new THREE.PlaneGeometry(4, 2);
            const mesh = new THREE.Mesh(geometry, material);
            
            // Store canvas and context for updates
            mesh.userData = { canvas: canvas, context: context, text: text };
            
            return mesh;
        }

        function updateTextTexture(textMesh, color) {
            const { canvas, context, text } = textMesh.userData;
            
            // Clear canvas
            context.clearRect(0, 0, canvas.width, canvas.height);
            
            // Update color and redraw with larger font
            context.font = 'bold 96px Courier New';
            context.fillStyle = color;
            context.strokeStyle = color;
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.letterSpacing = '8px';
            context.shadowColor = color;
            context.shadowBlur = 25;
            
            // Draw text with outline
            context.strokeText(text, canvas.width / 2, canvas.height / 2);
            context.fillText(text, canvas.width / 2, canvas.height / 2);
            
            // Update texture
            textMesh.material.map.needsUpdate = true;
        }

        function updateTextPositions() {
            // Text is now 3D geometry, no need to update screen positions
            // This function can be removed or left empty for compatibility
        }

        function setupOverlay() {
            if (base64Overlay && base64Overlay.length > 0) {
                if (!overlayElement) {
                    overlayElement = document.createElement('div');
                    overlayElement.style.position = 'absolute';
                    overlayElement.style.top = '50%';
                    overlayElement.style.left = '50%';
                    overlayElement.style.transform = 'translate(-50%, -50%)';
                    overlayElement.style.zIndex = '1000'; // Highest z-index to be on top of everything
                    overlayElement.style.pointerEvents = 'none';
                    document.body.appendChild(overlayElement);
                }
                
                overlayElement.innerHTML = '';
                const img = document.createElement('img');
                img.src = base64Overlay;
                
                // Always scale to fit the full screen while maintaining aspect ratio
                const screenSize = Math.min(window.innerWidth, window.innerHeight);
                img.style.width = screenSize + 'px';
                img.style.height = screenSize + 'px';
                img.style.objectFit = 'contain';
                
                overlayElement.appendChild(img);
            }
        }

        function updateClock() {
            const now = new Date();
            const hours = now.getHours() % 12;
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            const milliseconds = now.getMilliseconds();
            
            // Calculate angles (subtract PI/2 to start at 12 o'clock)
            const hourAngle = ((hours + minutes/60) / 12) * Math.PI * 2 - Math.PI/2;
            const minuteAngle = ((minutes + seconds/60) / 60) * Math.PI * 2 - Math.PI/2;
            const secondAngle = ((seconds + milliseconds/1000) / 60) * Math.PI * 2 - Math.PI/2;
            
            // Update hand rotations
            if (hourHand && hourHand.parent) {
                hourHand.parent.rotation.z = hourAngle;
            }
            if (minuteHand && minuteHand.parent) {
                minuteHand.parent.rotation.z = minuteAngle;
            }
            if (secondHand && secondHand.parent) {
                secondHand.parent.rotation.z = secondAngle;
            }
        }

        function updateColors() {
            const currentTime = Date.now();
            if (currentTime - lastColorChange > colorChangeInterval) {
                currentColor = currentColor === colors.primary ? colors.secondary : colors.primary;
                lastColorChange = currentTime;
                
                // Update all materials except second hand
                clockGroup.traverse((child) => {
                    if (child.material && child !== secondHand) {
                        child.material.color.setStyle(currentColor);
                    }
                });
                
                // Keep second hand secondary color
                if (secondHand && secondHand.material) {
                    secondHand.material.color.setStyle(colors.secondary);
                }
                
                // Update text colors using 3D texture updates
                textElements.forEach(({ textMesh }) => {
                    updateTextTexture(textMesh, currentColor);
                });
            }
        }

        function updateGridGlitch() {
            if (gridLines) {
                gridLines.children.forEach(line => {
                    // Randomly flicker opacity
                    if (Math.random() < 0.1) { // 10% chance to flicker each frame
                        line.material.opacity = 0.05 + Math.random() * 0.2; // Between 0.05 and 0.25
                    } else {
                        line.material.opacity = 0.1; // Base opacity
                    }
                });
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            // Update overlay size
            setupOverlay();
            updateTextPositions(); // Update positions on resize
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const elapsedTime = clock.getElapsedTime();
            
            // Update clock and colors
            updateClock();
            updateColors();
            updateGridGlitch(); // Call the glitch update
            updateTextPositions(); // Update positions every frame to keep them aligned
            updateClockTransform(); // Update transform to maintain floating animation
            
            renderer.render(scene, camera);
        }
    </script>
</body>
