        function init() {
            // Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(colors.background);
            
            // Camera setup
            camera = new THREE.PerspectiveCamera(75, 1, 0.1, 2000); // Square aspect
            camera.position.z = 5;
            
            // Renderer setup
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setClearColor(colors.background, 1);
            
            // Set renderer size to square container size
            const size = Math.min(window.innerWidth, window.innerHeight, 1000);
            renderer.setSize(size, size);
            
            // Position the canvas itself
            renderer.domElement.style.position = 'absolute';
            renderer.domElement.style.top = '50%';
            renderer.domElement.style.left = '50%';

            document.body.appendChild(renderer.domElement);
            
            // Set body styles
            document.body.style.margin = '0';
            document.body.style.padding = '0';
            document.body.style.overflow = 'hidden';
            document.body.style.backgroundColor = colors.background;
            
            // Set initial container size
            updateContainerSize();
            
            // Create scene elements
            createBlob();
            createPixelStars();
            createShootingStars();
            setupOverlay();
            
            // Window resize listener
            window.addEventListener('resize', onWindowResize);
        }

        function createBlob() {
            // Create blob 200% smaller (0.5 instead of 1.0)
            const blobGeometry = new THREE.IcosahedronGeometry(0.5, 64);
            blobGeometry.computeVertexNormals();

            const blobShaderMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    morphStrength: { value: 0.5 },
                    color1: { value: new THREE.Color(colors.primary) },
                    color2: { value: new THREE.Color(colors.secondary) },
                },
                vertexShader: `
                    uniform float time;
                    uniform float morphStrength;
                    varying vec3 vNormal;
                    varying vec3 vPosition;

                    void main() {
                        vNormal = normal;
                        vPosition = position;

                        // Faster morphing displacement
                        float noiseVal = sin(position.x * 3.0 + time * 2.0) * 0.5 +
                                         cos(position.y * 2.0 + time * 1.5) * 0.5 +
                                         sin(position.z * 4.0 + time * 2.5) * 0.5;

                        float displacement = noiseVal * morphStrength;
                        vec3 newPosition = position + normal * displacement;

                        gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform float time;
                    uniform vec3 color1;
                    uniform vec3 color2;
                    varying vec3 vNormal;
                    varying vec3 vPosition;

                    void main() {
                        // Faster color cycling for more flashing
                        float colorFactor = sin(time * 0.8 + vPosition.y * 2.0) * 0.5 + 0.5;
                        vec3 baseColor = mix(color1, color2, colorFactor);
                        
                        // Basic lighting
                        vec3 lightDirection = normalize(vec3(0.5, 1.0, 0.5));
                        float diffuse = max(dot(vNormal, lightDirection), 0.0);
                        vec3 finalColor = baseColor * (0.6 + diffuse * 0.4);

                        gl_FragColor = vec4(finalColor, 1.0);
                    }
                `,
                side: THREE.DoubleSide
            });

            blobMesh = new THREE.Mesh(blobGeometry, blobShaderMaterial);
            scene.add(blobMesh);
        }

        function createPixelStars() {
            const pixelCount = 15000;
            const pixelGeometry = new THREE.BufferGeometry();
            const pixelPositions = [];
            const pixelSizes = [];
            const pixelFlashPhases = [];

            for (let i = 0; i < pixelCount; i++) {
                const x = THREE.MathUtils.randFloatSpread(2000);
                const y = THREE.MathUtils.randFloatSpread(2000);
                const z = THREE.MathUtils.randFloatSpread(2000);
                pixelPositions.push(x, y, z);
                // Pixels 100% smaller (1.0-3.0 instead of 2.0-6.0)
                pixelSizes.push(THREE.MathUtils.randFloat(1.0, 3.0));
                pixelFlashPhases.push(THREE.MathUtils.randFloat(0, Math.PI * 2));
            }

            pixelGeometry.setAttribute('position', new THREE.Float32BufferAttribute(pixelPositions, 3));
            pixelGeometry.setAttribute('size', new THREE.Float32BufferAttribute(pixelSizes, 1));
            pixelGeometry.setAttribute('flashPhase', new THREE.Float32BufferAttribute(pixelFlashPhases, 1));

            const pixelShaderMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    pointTexture: { value: generatePixelTexture() },
                    time: { value: 0 },
                    travelSpeed: { value: 50.0 },
                    color1: { value: new THREE.Color(colors.primary) },
                    color2: { value: new THREE.Color(colors.secondary) },
                },
                vertexShader: `
                    attribute float size;
                    attribute float flashPhase;
                    uniform float time;
                    uniform float travelSpeed;
                    varying float vFlash;
                    varying float vColorChoice;

                    void main() {
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);

                        // Movement simulation
                        float wrapDepth = 2000.0;
                        mvPosition.z = mod(mvPosition.z - time * travelSpeed + wrapDepth, wrapDepth) - wrapDepth / 2.0;

                        // 500% faster flashing
                        float flashTime = sin(time * 10.0 + flashPhase) * 0.5 + 0.5;
                        vFlash = smoothstep(0.7, 1.0, flashTime);
                        
                        // Alternate between the two colors
                        vColorChoice = step(0.5, sin(time * 5.0 + flashPhase));

                        float finalSize = size * (1.0 + vFlash * 0.5);
                        gl_PointSize = finalSize * (800.0 / -mvPosition.z);

                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    uniform sampler2D pointTexture;
                    uniform vec3 color1;
                    uniform vec3 color2;
                    varying float vFlash;
                    varying float vColorChoice;

                    void main() {
                        vec4 texColor = texture2D(pointTexture, gl_PointCoord);
                        // Use exact colors - no mixing
                        vec3 pixelColor = vColorChoice > 0.5 ? color2 : color1;
                        vec3 finalColor = pixelColor * (0.4 + vFlash * 0.6);
                        
                        gl_FragColor = vec4(finalColor, texColor.a);
                    }
                `,
                transparent: true,
                blending: THREE.NormalBlending,
                depthWrite: false
            });

            pixelStars = new THREE.Points(pixelGeometry, pixelShaderMaterial);
            scene.add(pixelStars);
        }

        function createShootingStars() {
            const shootingStarCount = 8;
            const shootingStarGeometry = new THREE.BufferGeometry();
            const shootingStarPositions = [];
            const shootingStarSpeeds = [];
            const shootingStarLifetimes = [];
            const shootingStarMaxLifetimes = [];

            for (let i = 0; i < shootingStarCount; i++) {
                shootingStarPositions.push(
                    THREE.MathUtils.randFloatSpread(1000),
                    THREE.MathUtils.randFloatSpread(1000),
                    THREE.MathUtils.randFloatSpread(1000)
                );
                shootingStarSpeeds.push(THREE.MathUtils.randFloat(80, 200));
                shootingStarLifetimes.push(0);
                shootingStarMaxLifetimes.push(THREE.MathUtils.randFloat(1.5, 4));
            }

            shootingStarGeometry.setAttribute('position', new THREE.Float32BufferAttribute(shootingStarPositions, 3));
            shootingStarGeometry.setAttribute('speed', new THREE.Float32BufferAttribute(shootingStarSpeeds, 1));
            shootingStarGeometry.setAttribute('lifetime', new THREE.Float32BufferAttribute(shootingStarLifetimes, 1));
            shootingStarGeometry.setAttribute('maxLifetime', new THREE.Float32BufferAttribute(shootingStarMaxLifetimes, 1));

            const shootingStarMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    pointTexture: { value: generatePixelTexture() },
                    color1: { value: new THREE.Color(colors.primary) },
                    color2: { value: new THREE.Color(colors.secondary) },
                },
                vertexShader: `
                    attribute float speed;
                    attribute float lifetime;
                    attribute float maxLifetime;
                    varying float vAlpha;

                    void main() {
                        vec3 newPosition = position;
                        newPosition.x -= speed * lifetime * 0.6;
                        newPosition.y -= speed * lifetime * 0.4;
                        newPosition.z -= speed * lifetime * 0.5;

                        vec4 mvPosition = modelViewMatrix * vec4(newPosition, 1.0);
                        gl_PointSize = 20.0 * (1000.0 / -mvPosition.z);

                        vAlpha = 1.0 - (lifetime / maxLifetime);
                        vAlpha = smoothstep(0.0, 0.2, vAlpha) * smoothstep(1.0, 0.7, vAlpha);

                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    uniform sampler2D pointTexture;
                    uniform vec3 color1;
                    uniform vec3 color2;
                    varying float vAlpha;

                    void main() {
                        vec4 texColor = texture2D(pointTexture, gl_PointCoord);
                        vec3 shootingColor = mix(color1, color2, 0.7);
                        gl_FragColor = vec4(shootingColor, vAlpha * texColor.a);
                    }
                `,
                transparent: true,
                blending: THREE.NormalBlending,
                depthWrite: false
            });

            shootingStars = new THREE.Points(shootingStarGeometry, shootingStarMaterial);
            scene.add(shootingStars);
        }

        function generatePixelTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 16;
            canvas.height = 16;
            const context = canvas.getContext('2d');
            
            context.fillStyle = 'rgba(255,255,255,1)';
            context.fillRect(2, 2, 12, 12);
            
            context.fillStyle = 'rgba(255,255,255,0.5)';
            context.fillRect(0, 0, 16, 16);
            context.fillStyle = 'rgba(255,255,255,1)';
            context.fillRect(3, 3, 10, 10);
            
            return new THREE.CanvasTexture(canvas);
        }

        function setupOverlay() {
            if (base64Overlay && base64Overlay.length > 0) {
                if (!overlayElement) {
                    overlayElement = document.createElement('div');
                    overlayElement.style.position = 'absolute';
                    overlayElement.style.top = '50%';
                    overlayElement.style.left = '50%';
                    overlayElement.style.transform = 'translate(-50%, -50%)';
                    overlayElement.style.zIndex = '20';
                    overlayElement.style.pointerEvents = 'none';
                    document.body.appendChild(overlayElement);
                }
                
                overlayElement.innerHTML = '';
                const img = document.createElement('img');
                img.src = base64Overlay;
                
                const size = Math.min(window.innerWidth, window.innerHeight, 1000);
                img.style.width = size + 'px';
                img.style.height = size + 'px';
                img.style.objectFit = 'contain';
                
                overlayElement.appendChild(img);
            }
        }

        function updateColors() {
            const currentTime = Date.now();
            if (currentTime - lastColorChange > colorChangeInterval) {
                currentColor = currentColor === colors.primary ? colors.secondary : colors.primary;
                lastColorChange = currentTime;
                
                // Update blob colors
                if (blobMesh && blobMesh.material && blobMesh.material.uniforms) {
                    blobMesh.material.uniforms.color1.value.setStyle(currentColor);
                    blobMesh.material.uniforms.color2.value.setStyle(currentColor === colors.primary ? colors.secondary : colors.primary);
                }
                
                // Update pixel star colors
                if (pixelStars) {
                    pixelStars.material.uniforms.color1.value.setStyle(currentColor);
                    pixelStars.material.uniforms.color2.value.setStyle(currentColor === colors.primary ? colors.secondary : colors.primary);
                }
                
                // Update shooting star colors
                if (shootingStars) {
                    shootingStars.material.uniforms.color1.value.setStyle(currentColor);
                    shootingStars.material.uniforms.color2.value.setStyle(currentColor === colors.primary ? colors.secondary : colors.primary);
                }
            }
        }

        function updateContainerSize() {
            const size = Math.min(window.innerWidth, window.innerHeight, 1000) * 0.98; // 98% size
            renderer.setSize(size, size);
            camera.aspect = 1;
            camera.updateProjectionMatrix();
        }

        function onWindowResize() {
            updateContainerSize();
            setupOverlay();
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const elapsedTime = clock.getElapsedTime();
            
            // Update blob with faster morphing and rotation
            if (blobMesh && blobMesh.material && blobMesh.material.uniforms) {
                blobMesh.material.uniforms.time.value = elapsedTime;
                blobMesh.rotation.y += 0.004; // Faster rotation
                blobMesh.rotation.x += 0.002;
            }
            
            // Update shooting stars
            if (shootingStars) {
                const lifetimes = shootingStars.geometry.attributes.lifetime.array;
                const maxLifetimes = shootingStars.geometry.attributes.maxLifetime.array;
                const positions = shootingStars.geometry.attributes.position.array;

                for (let i = 0; i < lifetimes.length; i++) {
                    lifetimes[i] += delta;
                    if (lifetimes[i] > maxLifetimes[i]) {
                        lifetimes[i] = 0;
                        positions[i * 3 + 0] = THREE.MathUtils.randFloatSpread(1000);
                        positions[i * 3 + 1] = THREE.MathUtils.randFloatSpread(1000);
                        positions[i * 3 + 2] = THREE.MathUtils.randFloatSpread(1000);
                        maxLifetimes[i] = THREE.MathUtils.randFloat(1.5, 4);
                    }
                }
                shootingStars.geometry.attributes.lifetime.needsUpdate = true;
                shootingStars.geometry.attributes.position.needsUpdate = true;
            }
            
            // Update pixel stars
            if (pixelStars) {
                pixelStars.material.uniforms.time.value = elapsedTime;
            }
            
            // Update colors
            updateColors();
            
            renderer.render(scene, camera);
        }
    </script>
</body>
