        function preload() {
            // Load base64 image if provided
            if (base64Image !== '') {
                overlayImage = loadImage(base64Image);
            }
        }

        function setup() {
            cnv = createCanvas(windowWidth, windowHeight);
            cnv.elt.style.touchAction = 'none';

            // Set background color
            background('#000a25');
            
            // Initialize current color
            currentColor = color1;

            // Initialize particles
            for (let i = 0; i < 500; i++) {
                particles[i] = new Particle();
            }
        }

        function draw() {
            // Gradually fade the background to create trails
            noStroke();
            fill(0, 10, 37, 10); // Background color with low transparency
            rect(0, 0, width, height);

            // Update color cycling
            if (millis() - lastColorChangeTime > colorChangeInterval) {
                currentColor = (currentColor === color1) ? color2 : color1;
                lastColorChangeTime = millis();
            }

            // Generate circular flow field around center point
            flowfield = new Array(floor(width / resolution) * floor(height / resolution));
            let centerX = width / 2;
            let centerY = height / 2;
            
            let yoff = 0;
            for (let y = 0; y < height; y += resolution) {
                let xoff = 0;
                for (let x = 0; x < width; x += resolution) {
                    let index = floor(x / resolution) + floor(y / resolution) * floor(width / resolution);
                    
                    // Calculate angle from current point to center
                    let angleToCenter = atan2(y - centerY, x - centerX);
                    
                    // Add 90 degrees (PI/2) to make particles flow around the center
                    let circularAngle = angleToCenter + PI/9;
                    
                    // Add some noise for variation
                    let noiseInfluence = noise(xoff, yoff, zoff) * 0.5; // Reduced noise influence
                    circularAngle += noiseInfluence;
                    
                    // Distance from center affects flow strength
                    let distFromCenter = dist(x, y, centerX, centerY);
                    let flowStrength = map(distFromCenter, 0, min(width, height)/2, 0.8, 0.3, true);
                    
                    let v = p5.Vector.fromAngle(circularAngle);
                    v.setMag(flowStrength);
                    flowfield[index] = v;
                    xoff += 0.1;
                }
                yoff += 0.1;
            }
            zoff += 0.015; // Much faster animation of the flow field

            // Update and display particles
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.follow(flowfield);
                p.update();
                p.edges();
                p.show();
            }

            // Draw base64 image overlay (fitted to bottom, maintaining proportions)
            if (overlayImage) {
                // Calculate scale to fit width while maintaining aspect ratio
                let scaleX = width / overlayImage.width;
                let scaleY = height / overlayImage.height;
                let scale = min(scaleX, scaleY); // Use smaller scale to fit entirely
                
                // Calculate new dimensions
                let newWidth = overlayImage.width * scale;
                let newHeight = overlayImage.height * scale;
                
                // Position at bottom center
                let imgX = (width - newWidth) / 2;
                let imgY = height - newHeight;
                
                image(overlayImage, imgX, imgY, newWidth, newHeight);
            }
        }

        class Particle {
            constructor() {
                this.pos = createVector(random(width), random(height));
                this.prevPos = this.pos.copy();
                this.vel = createVector(0, 0);
                this.acc = createVector(0, 0);
                this.maxspeed = random(1, 4);
                
                // Use current cycling color
                this.color = color(currentColor);
                
                this.lifespan = 255; // Initial lifespan for the particle
                this.birthOpacity = 0; // Start invisible for smooth fade-in
                this.fadeInSpeed = random(2, 8); // Random fade-in speed
            }

            reborn() {
                this.pos = createVector(random(width), random(height));
                this.prevPos = this.pos.copy();
                this.vel = createVector(0, 0);
                this.acc = createVector(0, 0);
                this.lifespan = 255; // Reset lifespan
                this.maxspeed = random(1, 4);
                this.color = color(currentColor); // Update to current color on reborn
                
                // Reset fade-in properties for smooth appearance
                this.birthOpacity = 0;
                this.fadeInSpeed = random(4, 12); // Faster fade-in
            }

            follow(vectors) {
                let x = floor(this.pos.x / resolution);
                let y = floor(this.pos.y / resolution);
                let index = x + y * floor(width / resolution);
                if (index >= 0 && index < vectors.length) {
                    let force = vectors[index];
                    this.applyForce(force);
                }
            }

            applyForce(force) {
                this.acc.add(force);
            }

            update() {
                this.vel.add(this.acc);
                this.vel.limit(this.maxspeed);
                this.pos.add(this.vel);
                this.acc.mult(0);

                // Particles 'age' over time
                this.lifespan -= 1;
                
                // Smooth fade-in for new particles
                if (this.birthOpacity < 255) {
                    this.birthOpacity = min(255, this.birthOpacity + this.fadeInSpeed);
                }
            }

            show() {
                // Combine aging fade-out with birth fade-in
                let agingAlpha = map(this.lifespan, 0, 255, 0, 255);
                let birthAlpha = this.birthOpacity;
                let finalAlpha = min(agingAlpha, birthAlpha); // Use the lower of the two
                
                let c = this.color;
                c.setAlpha(finalAlpha);
                stroke(c);
                
                // Line thickness changes based on particle speed
                let thickness = map(this.vel.mag(), 0, this.maxspeed, 0.5, 4);
                strokeWeight(thickness);
                
                line(this.pos.x, this.pos.y, this.prevPos.x, this.prevPos.y);
                
                this.prevPos.x = this.pos.x;
                this.prevPos.y = this.pos.y;
            }

            edges() {
                if (this.pos.x < 0 || this.pos.x > width || this.pos.y < 0 || this.pos.y > height || this.lifespan < 1) {
                    this.reborn(); // Particle 'dies' and is reborn
                }
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            background('#000a25');
            // Re-initialize particles to redistribute them across the new canvas
            particles = [];
            for (let i = 0; i < 1000; i++) {
                particles[i] = new Particle();
            }
        }
