        function preload() {
            if (base64ImageForeground && base64ImageForeground.length > 0) {
                foregroundImage = loadImage(base64ImageForeground);
            }
        }

        function setup() {
            let isFullscreen = windowWidth >= screen.width && windowHeight >= screen.height;
            canvasSize = isFullscreen ? 1000 : min(1000, min(windowWidth, windowHeight));
            let cnv = createCanvas(canvasSize, canvasSize);
            
            cnv.position(max(0, (windowWidth - canvasSize) / 2), max(0, (windowHeight - canvasSize) / 2));
            
            cnv.elt.style.border = 'none';
            cnv.elt.style.outline = 'none';
            cnv.elt.style.boxShadow = 'none';
            cnv.elt.style.margin = '0';
            cnv.elt.style.padding = '0';
            
            document.body.style.backgroundColor = '#000a25 !important';
            document.body.style.margin = '0 !important';
            document.body.style.padding = '0 !important';
            document.documentElement.style.backgroundColor = '#000a25 !important';
            
            if (document.body.parentElement) {
                document.body.parentElement.style.backgroundColor = '#000a25 !important';
            }
            
            let style = document.createElement('style');
            style.innerHTML = `
                * { background-color: #000a25 !important; }
                body, html { background-color: #000a25 !important; margin: 0 !important; padding: 0 !important; }
            `;
            document.head.appendChild(style);
            
            imageMode(CENTER);

            // Calculate center point
            centerX = canvasSize / 2;
            centerY = canvasSize / 2;

            nodeSpacing = contentSize / (numCols + 1);
            if (nodeSpacing > contentSize / (numRows + 1)) {
                nodeSpacing = contentSize / (numRows + 1);
            }

            for (let r = 0; r < numRows; r++) {
                nodes[r] = [];
                for (let c = 0; c < numCols; c++) {
                    let x = map(c, 0, numCols - 1, margin + nodeSpacing * 1.5, margin + contentSize - nodeSpacing * 1.5) * (canvasSize / 1000);
                    let y = map(r, 0, numRows - 1, margin + nodeSpacing * 1.5, margin + contentSize - nodeSpacing * 1.5) * (canvasSize / 1000);
                    nodes[r][c] = new Node(x, y);
                }
            }

            currentColor = color(color1);
        }

        function draw() {
            background('#000a25');
            
            if (millis() - lastColorChangeTime > colorChangeInterval) {
                if (currentColor.toString() === color(color1).toString()) {
                    currentColor = color(color2);
                } else {
                    currentColor = color(color1);
                }
                lastColorChangeTime = millis();
            }

            // Perfect loop time calculation
            let time = (frameCount * waveSpeed) % loopDuration;

            // Update nodes with wave warp from center
            for (let r = 0; r < numRows; r++) {
                for (let c = 0; c < numCols; c++) {
                    let node = nodes[r][c];
                    
                    // Calculate distance from center
                    let distFromCenter = dist(node.initialX, node.initialY, centerX, centerY);
                    
                    // Calculate angle from center
                    let angleFromCenter = atan2(node.initialY - centerY, node.initialX - centerX);
                    
                    // Create wave that radiates from center
                    let wavePhase = distFromCenter * waveFrequency - time;
                    let waveValue = sin(wavePhase);
                    
                    // Apply wave displacement in direction away from center
                    let displacement = waveValue * waveAmplitude * (canvasSize / 1000);
                    
                    // Add secondary wave for more complex motion
                    let secondaryWave = sin(wavePhase * 2 + time * 0.5) * 0.3;
                    displacement += secondaryWave * waveAmplitude * 0.5 * (canvasSize / 1000);
                    
                    // Calculate new position
                    node.x = node.initialX + cos(angleFromCenter) * displacement;
                    node.y = node.initialY + sin(angleFromCenter) * displacement;
                    
                    // Add subtle perpendicular wave for organic feel
                    let perpDisplacement = cos(wavePhase * 1.5 + time * 0.3) * waveAmplitude * 0.2 * (canvasSize / 1000);
                    node.x += cos(angleFromCenter + PI/2) * perpDisplacement;
                    node.y += sin(angleFromCenter + PI/2) * perpDisplacement;
                }
            }

            noFill();
            strokeWeight(3);
            stroke(currentColor);
            drawMesh();

            if (foregroundImage) {
                let imgSize = canvasSize;
                image(foregroundImage, width / 2, height / 2, imgSize, imgSize);
            }
        }

        function drawMesh() {
            for (let r = 0; r < numRows; r++) {
                for (let c = 0; c < numCols; c++) {
                    let node = nodes[r][c];

                    // Only draw vertical lines
                    if (r < numRows - 1) {
                        let nextNode = nodes[r + 1][c];
                        line(
                            node.x,
                            node.y,
                            nextNode.x,
                            nextNode.y
                        );
                    }
                }
            }
        }

        class Node {
            constructor(x, y) {
                this.initialX = x; 
                this.initialY = y;
                this.x = x;
                this.y = y;
            }
        }

        function windowResized() {
            let isFullscreen = windowWidth >= screen.width && windowHeight >= screen.height;
            let newCanvasSize = isFullscreen ? 1000 : min(1000, min(windowWidth, windowHeight));
            
            if (newCanvasSize !== canvasSize) {
                canvasSize = newCanvasSize;
                resizeCanvas(canvasSize, canvasSize);
                
                // Recalculate center
                centerX = canvasSize / 2;
                centerY = canvasSize / 2;
            }
            
            select('canvas').position(max(0, (windowWidth - canvasSize) / 2), max(0, (windowHeight - canvasSize) / 2));
            
            nodeSpacing = contentSize / (numCols + 1);
            if (nodeSpacing > contentSize / (numRows + 1)) {
                nodeSpacing = contentSize / (numRows + 1);
            }

            for (let r = 0; r < numRows; r++) {
                for (let c = 0; c < numCols; c++) {
                    let x = map(c, 0, numCols - 1, margin + nodeSpacing * 1.5, margin + contentSize - nodeSpacing * 1.5) * (canvasSize / 1000);
                    let y = map(r, 0, numRows - 1, margin + nodeSpacing * 1.5, margin + contentSize - nodeSpacing * 1.5) * (canvasSize / 1000);
                    nodes[r][c].initialX = x;
                    nodes[r][c].initialY = y;
                    nodes[r][c].x = x;
                    nodes[r][c].y = y;
                }
            }
        }
