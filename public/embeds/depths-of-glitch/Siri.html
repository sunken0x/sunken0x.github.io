            nodeSpacing = contentSize / (numCols + 1);
            if (nodeSpacing > contentSize / (numRows + 1)) {
                nodeSpacing = contentSize / (numRows + 1);
            }

            for (let r = 0; r < numRows; r++) {
                nodes[r] = [];
                for (let c = 0; c < numCols; c++) {
                    // Scale node positions to canvas size
                    let x = map(c, 0, numCols - 1, margin + nodeSpacing * 1.5, margin + contentSize - nodeSpacing * 1.5) * (canvasSize / 1000);
                    let y = map(r, 0, numRows - 1, margin + nodeSpacing * 1.5, margin + contentSize - nodeSpacing * 1.5) * (canvasSize / 1000);
                    nodes[r][c] = new Node(x, y);
                }
            }

            currentColor = color(color1);
        }

        function draw() {
            background('#000a25');

            // Scale images to match canvas size
            let imgSize = canvasSize;
            
            // Handle layer switching every 100 seconds with randomness
            let currentTime = millis();
            if (currentTime - lastLayerSwitchTime > layerSwitchInterval) {
                // 70% chance to actually switch layers (30% chance to stay the same)
                if (random() < 0.7) {
                    imageIsBehind = !imageIsBehind;
                }
                lastLayerSwitchTime = currentTime;
            }
            
            // Draw background image ONLY if it's supposed to be behind
            if (backgroundImage && imageIsBehind) {
                image(backgroundImage, width / 2, height / 2, imgSize, imgSize);
            }
            
            if (millis() - lastColorChangeTime > colorChangeInterval) {
                if (currentColor.toString() === color(color1).toString()) {
                    currentColor = color(color2);
                } else {
                    currentColor = color(color1);
                }
                lastColorChangeTime = millis();
            }

            if (frameCount % 9 < 6) {
                for (let r = 0; r < numRows; r++) {
                    for (let c = 0; c < numCols; c++) {
                        let node = nodes[r][c];

                        if (frameCount % 2 === 0) {
                            let terrainX = 0;
                            let terrainY = 0;
                            let amplitude = 1;
                            
                            for (let octave = 0; octave < terrainLayers; octave++) {
                                let freq = noiseScale * pow(2, octave);
                                let noiseValX = noise(node.initialX * freq * (1000 / canvasSize), node.initialY * freq * (1000 / canvasSize), frameCount * noiseSpeed) * 2 - 1;
                                let noiseValY = noise(node.initialY * freq * (1000 / canvasSize), node.initialX * freq * (1000 / canvasSize), frameCount * noiseSpeed + 1000) * 2 - 1;
                                terrainX += noiseValX * amplitude;
                                terrainY += noiseValY * amplitude;
                                amplitude *= terrainRoughness;
                            }
                            
                            let cardDanceOffset = noise(node.initialX * 0.005 * (1000 / canvasSize), node.initialY * 0.005 * (1000 / canvasSize), frameCount * 0.015) * 2 - 1;
                            cardDanceOffset = pow(abs(cardDanceOffset), 0.7) * (cardDanceOffset > 0 ? 1 : -1);
                            
                            node.targetX = node.initialX + terrainX * terrainGlitchIntensity * (canvasSize / 1000);
                            node.targetY = node.initialY + terrainY * terrainGlitchIntensity * (canvasSize / 1000) + cardDanceOffset * cardDanceIntensity * (canvasSize / 1000);
                        }

                        if (frameCount % 3 === 0) {
                            let chaoticNoiseX = noise(node.targetX * 0.003 * (1000 / canvasSize), node.targetY * 0.003 * (1000 / canvasSize), frameCount * 0.01) * 2 - 1;
                            let chaoticNoiseY = noise(node.targetY * 0.003 * (1000 / canvasSize), node.targetX * 0.003 * (1000 / canvasSize), frameCount * 0.01 + 100) * 2 - 1;
                            let turbulenceX = noise(node.targetX * 0.015 * (1000 / canvasSize), node.targetY * 0.015 * (1000 / canvasSize), frameCount * 0.025) * 2 - 1;
                            let turbulenceY = noise(node.targetY * 0.015 * (1000 / canvasSize), node.targetX * 0.015 * (1000 / canvasSize), frameCount * 0.025 + 500) * 2 - 1;
                            node.ax += (chaoticNoiseX + turbulenceX * 0.3) * chaoticNoiseIntensity * (canvasSize / 1000);
                            node.ay += (chaoticNoiseY + turbulenceY * 0.3) * chaoticNoiseIntensity * (canvasSize / 1000);
                        }

                        node.update();
                    }
                }

                noFill();
                strokeWeight(3);

                stroke(currentColor);
                drawMesh(0, 0);
            }

            // Draw image IN FRONT if it's supposed to be above the glitch
            if (backgroundImage && !imageIsBehind) {
                image(backgroundImage, width / 2, height / 2, imgSize, imgSize);
            }
        }

        function drawMesh(offsetX, offsetY) {
            for (let r = 0; r < numRows; r++) {
                for (let c = 0; c < numCols; c++) {
                    let node = nodes[r][c];
                    let displacement = dist(node.x, node.y, node.initialX, node.initialY);

                    let terrainHeight = noise(node.initialX * 0.003 * (1000 / canvasSize), node.initialY * 0.003 * (1000 / canvasSize), frameCount * 0.008);
                    let glitchOffsetFactor = map(displacement, 0, maxDisplacement, 0, 25) * (1 + terrainHeight);

                    let noiseX = 0;
                    let noiseY = 0;
                    if (frameCount % 4 === 0) {
                        noiseX = noise(node.initialX * 0.005 * (1000 / canvasSize), node.initialY * 0.005 * (1000 / canvasSize), frameCount * 0.05) * 2 - 1;
                        noiseY = noise(node.initialY * 0.005 * (1000 / canvasSize), node.initialX * 0.005 * (1000 / canvasSize), frameCount * 0.05 + 100) * 2 - 1;
                        
                        let fractalX = noise(node.initialX * 0.02 * (1000 / canvasSize), node.initialY * 0.02 * (1000 / canvasSize), frameCount * 0.03) * 2 - 1;
                        let fractalY = noise(node.initialY * 0.02 * (1000 / canvasSize), node.initialX * 0.02 * (1000 / canvasSize), frameCount * 0.03 + 200) * 2 - 1;
                        
                        noiseX += fractalX * 0.5;
                        noiseY += fractalY * 0.5;
                        
                        node._cachedNoiseX = noiseX;
                        node._cachedNoiseY = noiseY;
                    } else {
                        noiseX = node._cachedNoiseX || 0;
                        noiseY = node._cachedNoiseY || 0;
                    }

                    let cardDanceX = sin(node.initialX * 9 * (1000 / canvasSize) + frameCount * 0.05) * terrainHeight * 15;
                    let cardDanceY = cos(node.initialY * 91 * (1000 / canvasSize) + frameCount * 0.05) * terrainHeight * 15;

                    let finalGlitchOffsetX = offsetX * glitchOffsetFactor + noiseX * fractalGlitchIntensity + cardDanceX;
                    let finalGlitchOffsetY = offsetY * glitchOffsetFactor + noiseY * fractalGlitchIntensity + cardDanceY;

                    // Only draw vertical lines
                    if (r < numRows - 1) {
                        let nextNode = nodes[r + 1][c];
                        line(
                            node.x + finalGlitchOffsetX,
                            node.y + finalGlitchOffsetY,
                            nextNode.x + finalGlitchOffsetX,
                            nextNode.y + finalGlitchOffsetY
                        );
                    }
                }
            }
        }

        class Node {
            constructor(x, y) {
                this.initialX = x; 
                this.initialY = y;
                this.targetX = x;
                this.targetY = y;
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.ax = 0;
                this.ay = 0;
                this._cachedNoiseX = 0;
                this._cachedNoiseY = 0;
            }

            update() {
                let fx = (this.targetX - this.x) * springConstant;
                let fy = (this.targetY - this.y) * springConstant;

                this.ax += fx;
                this.ay += fy;

                this.vx += this.ax;
                this.vy += this.ay;

                this.vx *= damping;
                this.vy *= damping;

                this.x += this.vx;
                this.y += this.vy;

                this.ax = 0;
                this.ay = 0;

                let displacement = dist(this.x, this.y, this.targetX, this.targetY);
                if (displacement > maxDisplacement) {
                    let angle = atan2(this.y - this.targetY, this.x - this.targetX);
                    this.x = this.targetX + cos(angle) * maxDisplacement;
                    this.y = this.targetY + sin(angle) * maxDisplacement;
                    this.vx *= 0.5;
                    this.vy *= 0.5;
                }
            }
        }

        function windowResized() {
            // Check if in fullscreen
            let isFullscreen = windowWidth >= screen.width && windowHeight >= screen.height;
            let newCanvasSize = isFullscreen ? 1000 : min(1000, min(windowWidth, windowHeight));
            
            // Only resize if canvas size changes
            if (newCanvasSize !== canvasSize) {
                canvasSize = newCanvasSize;
                resizeCanvas(canvasSize, canvasSize);
            }
            
            select('canvas').position(max(0, (windowWidth - canvasSize) / 2), max(0, (windowHeight - canvasSize) / 2));
            
            // Maintain fixed grid proportions based on 1000x1000 canvas
            nodeSpacing = contentSize / (numCols + 1);
            if (nodeSpacing > contentSize / (numRows + 1)) {
                nodeSpacing = contentSize / (numRows + 1);
            }

            for (let r = 0; r < numRows; r++) {
                for (let c = 0; c < numCols; c++) {
                    let x = map(c, 0, numCols - 1, margin + nodeSpacing * 1.5, margin + contentSize - nodeSpacing * 1.5) * (canvasSize / 1000);
                    let y = map(r, 0, numRows - 1, margin + nodeSpacing * 1.5, margin + contentSize - nodeSpacing * 1.5) * (canvasSize / 1000);
                    nodes[r][c].initialX = x;
                    nodes[r][c].initialY = y;
                    nodes[r][c].targetX = x;
                    nodes[r][c].targetY = y;
                    nodes[r][c].x = x;
                    nodes[r][c].y = y;
                    nodes[r][c].vx = 0;
                    nodes[r][c].vy = 0;
                    nodes[r][c]._cachedNoiseX = 0;
                    nodes[r][c]._cachedNoiseY = 0;
                }
            }
        }
    </script>
</body>
