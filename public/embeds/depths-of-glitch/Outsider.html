function preload() {
    if (base64Image && base64Image.length > 0) {
        backgroundImage = loadImage(base64Image);
    }
}

function setup() {
  cnv = createCanvas(windowWidth, windowHeight);
  imageMode(CENTER);
  
  // Set background to dark blue #000a25
  document.body.style.backgroundColor = '#000a25 !important';
  document.body.style.margin = '0 !important';
  document.body.style.padding = '0 !important';
  document.documentElement.style.backgroundColor = '#000a25 !important';

  colorMode(HSB, 360, 100, 100, 255);
  textSize(charSize);
  textFont('monospace');

  // Create streams for each column
  for (let x = 0; x < width; x += charSize) {
    let stream = new Stream(x);
    stream.generateRaindrops();
    streams.push(stream);
  }
  
  currentColor = color1;
}

function draw() {
  // Dark blue background #000a25 in HSB mode
  background(225, 95, 15, fadeSpeed);

  // Handle color switching
  if (millis() - lastColorChangeTime > colorChangeInterval) {
    if (currentColor === color1) {
      currentColor = color2;
    } else {
      currentColor = color1;
    }
    lastColorChangeTime = millis();
  }

  for (let i = 0; i < streams.length; i++) {
    streams[i].update();
    streams[i].display();
  }
  
  // Draw placeholder image to fit the window while maintaining proportions
  if (backgroundImage) {
    // Calculate aspect ratios
    let imgAspect = backgroundImage.width / backgroundImage.height;
    let windowAspect = width / height;
    
    let imgWidth, imgHeight;
    
    // Fit image to window while maintaining aspect ratio
    if (imgAspect > windowAspect) {
      // Image is wider than window - fit to width
      imgWidth = width;
      imgHeight = width / imgAspect;
    } else {
      // Image is taller than window - fit to height
      imgHeight = height;
      imgWidth = height * imgAspect;
    }
    
    // Draw image completely opaque
    image(backgroundImage, width / 2, height / 2, imgWidth, imgHeight);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  // Re-initialize streams on resize to fit new width
  streams = [];
  for (let x = 0; x < width; x += charSize) {
    let stream = new Stream(x);
    stream.generateRaindrops();
    streams.push(stream);
  }
}

class Raindrop {
  constructor(x, y, speed, char) {
    this.x = x;
    this.y = y;
    this.speed = speed;
    this.char = char;
  }

  setRandomChar() {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    this.char = chars.charAt(floor(random(chars.length)));
  }

  update() {
    this.y += this.speed;
    if (this.y > height + charSize) {
      this.y = random(-200, 0);
      this.setRandomChar();
    }
  }

  display() {
    let mouseDist = dist(this.x, this.y, mouseX, mouseY);
    let effectRadius = 200;

    let hue, saturation, brightness, alpha;
    
    if (currentColor === color1) {
      // Pink/magenta
      hue = 300; 
      saturation = 85;
      brightness = 90;
    } else {
      // Cyan/blue  
      hue = 185;
      saturation = 85;
      brightness = 95;
    }
    
    alpha = 255;

    if (mouseDist < effectRadius) {
      // Closer to mouse: brighter/whiter
      saturation = map(mouseDist, 0, effectRadius, 10, saturation);
      brightness = map(mouseDist, 0, effectRadius, 100, brightness);
    }

    fill(hue, saturation, brightness, alpha);
    text(this.char, this.x, this.y);
  }
}

class Stream {
  constructor(x) {
    this.x = x;
    this.raindrops = [];
    this.totalRaindrops = floor(height / charSize) + 5;
    this.speed = random(5, 15);
  }

  generateRaindrops() {
    let y = random(-height, 0);
    for (let i = 0; i < this.totalRaindrops; i++) {
      let raindrop = new Raindrop(this.x, y, this.speed, '');
      raindrop.setRandomChar();
      this.raindrops.push(raindrop);
      y -= charSize;
    }
  }

  update() {
    for (let i = 0; i < this.raindrops.length; i++) {
      this.raindrops[i].update();
    }
  }

  display() {
    for (let i = 0; i < this.raindrops.length; i++) {
      this.raindrops[i].display();
    }
  }
}
