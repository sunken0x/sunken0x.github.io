        // Vortex parameters
        let vortexStrength = 0.8;
        let vortexRadius = 200;
        let spiralTightness = 0.02;
        
        function preload() {
            // Load base64 image if provided
            if (base64Image !== '') {
                overlayImage = loadImage(base64Image);
            }
        }
        
        function setup() {
            cnv = createCanvas(windowWidth, windowHeight);
            cnv.elt.style.touchAction = 'none';
            
            background('#000a25');
            currentColor = color1;
            
            // Initialize particles
            for (let i = 0; i < 2500; i++) {
                particles[i] = new Particle();
            }
        }
        
        function draw() {
            // Clean background every frame - NO TRAILS!
            background('#000a25');
            
            // Update color cycling
            if (millis() - lastColorChangeTime > colorChangeInterval) {
                currentColor = (currentColor === color1) ? color2 : color1;
                lastColorChangeTime = millis();
            }
            
            // Generate swirling vortex flow field
            flowfield = new Array(floor(width / resolution) * floor(height / resolution));
            let centerX = width / 2;
            let centerY = height / 2;
            
            let yoff = 0;
            for (let y = 0; y < height; y += resolution) {
                let xoff = 0;
                for (let x = 0; x < width; x += resolution) {
                    let index = floor(x / resolution) + floor(y / resolution) * floor(width / resolution);
                    
                    // Distance and angle from center
                    let distFromCenter = dist(x, y, centerX, centerY);
                    let angleToCenter = atan2(y - centerY, x - centerX);
                    
                    // Create vortex effect
                    let vortexAngle = angleToCenter + (vortexStrength / (distFromCenter * spiralTightness + 1));
                    
                    // Add time-based rotation for dynamic swirling - FASTER!
                    vortexAngle += sin(millis() * 0.002 + distFromCenter * 0.01) * 0.8;
                    
                    // Add noise for organic movement
                    let noiseValue = noise(xoff, yoff, zoff) * 2;
                    vortexAngle += noiseValue;
                    
                    // Inward pull towards center combined with rotation
                    let inwardPull = map(distFromCenter, 0, min(width, height)/2, 2.0, 0.1);
                    let rotationalForce = map(distFromCenter, 0, vortexRadius, 1.5, 0.3);
                    
                    // Combine inward and rotational forces
                    let inwardVector = p5.Vector.fromAngle(angleToCenter + PI);
                    let rotationalVector = p5.Vector.fromAngle(vortexAngle);
                    
                    inwardVector.mult(inwardPull * 0.3);
                    rotationalVector.mult(rotationalForce);
                    
                    let combinedVector = p5.Vector.add(inwardVector, rotationalVector);
                    
                    // Add some turbulence at the edges
                    if (distFromCenter > vortexRadius) {
                        let turbulence = noise(xoff * 0.05, yoff * 0.05, zoff * 2) * 4 - 2;
                        combinedVector.rotate(turbulence);
                        combinedVector.mult(0.7);
                    }
                    
                    flowfield[index] = combinedVector;
                    xoff += 0.08;
                }
                yoff += 0.08;
            }
            zoff += 0.02;
            
            // Update and display particles
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.follow(flowfield);
                p.update();
                p.edges();
                p.show();
            }
            
            // Draw base64 image overlay (fitted to bottom, maintaining proportions)
            if (typeof overlayImage !== 'undefined' && overlayImage) {
                // Calculate scale to fit width while maintaining aspect ratio
                let scaleX = width / overlayImage.width;
                let scaleY = height / overlayImage.height;
                let scale = min(scaleX, scaleY); // Use smaller scale to fit entirely
                
                // Calculate new dimensions
                let newWidth = overlayImage.width * scale;
                let newHeight = overlayImage.height * scale;
                
                // Position at bottom center
                let imgX = (width - newWidth) / 2;
                let imgY = height - newHeight;
                
                image(overlayImage, imgX, imgY, newWidth, newHeight);
            }
        }
        
        class Particle {
            constructor() {
                this.pos = createVector(random(width), random(height));
                this.vel = createVector(0, 0);
                this.acc = createVector(0, 0);
                this.maxspeed = random(1, 4);
                this.color = color(currentColor);
                this.size = random(2, 5);
                this.opacity = random(150, 255);
            }
            
            reborn() {
                // Spawn particles more frequently near the edges for better vortex effect
                let spawnRadius = random(min(width, height) * 0.3, min(width, height) * 0.6);
                let spawnAngle = random(TWO_PI);
                this.pos = createVector(
                    width/2 + cos(spawnAngle) * spawnRadius,
                    height/2 + sin(spawnAngle) * spawnRadius
                );
                this.vel = createVector(0, 0);
                this.acc = createVector(0, 0);
                this.maxspeed = random(1, 4);
                this.color = color(currentColor);
                this.size = random(2, 5);
                this.opacity = random(150, 255);
            }
            
            follow(vectors) {
                let x = floor(this.pos.x / resolution);
                let y = floor(this.pos.y / resolution);
                let index = x + y * floor(width / resolution);
                if (index >= 0 && index < vectors.length && vectors[index]) {
                    let force = vectors[index];
                    this.applyForce(force);
                }
            }
            
            applyForce(force) {
                this.acc.add(force);
            }
            
            update() {
                this.vel.add(this.acc);
                this.vel.limit(this.maxspeed);
                this.pos.add(this.vel);
                this.acc.mult(0);
            }
            
            show() {
                let c = this.color;
                c.setAlpha(this.opacity);
                fill(c);
                noStroke();
                
                // Draw particle as circle - NO LINES/TRAILS
                circle(this.pos.x, this.pos.y, this.size);
            }
            
            edges() {
                let centerDist = dist(this.pos.x, this.pos.y, width/2, height/2);
                
                if (this.pos.x < -50 || this.pos.x > width + 50 || 
                    this.pos.y < -50 || this.pos.y > height + 50 || 
                    centerDist < 20) {
                    this.reborn();
                }
            }
        }
        
        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            particles = [];
            for (let i = 0; i < 2500; i++) {
                particles[i] = new Particle();
            }
        }
