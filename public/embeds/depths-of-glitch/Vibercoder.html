    import * as THREE from 'three';

        // Robot Scene Class
        class RobotSceneAddition {
            constructor(existingScene) {
                this.scene = existingScene;
                this.lines = [];
                this.robotGroup = new THREE.Group();
                this.spheres = []; // Track spheres for rotation
                this.rectangles = []; // Track rectangles for flashing
                this.grid = null; // Track grid for updates
                this.scene.add(this.robotGroup);
                
                // Colors - only primary and secondary
                this.colors = {
                    primary: 0xe224e7,    // Magenta
                    secondary: 0x2ce1f5,  // Cyan
                    white: 0xffffff
                };

                this.init();
            }

            init() {
                this.createGlitchBackground();
                this.createRobotOverlay();
                this.createAllSpheres();
                this.createUIElements();
                this.createGrid();
            }

            createGlitchBackground() {
                const lineCount = 200;
                const pointsPerLine = 160;
                const spacing = 0.06;

                for (let lineY = 0; lineY < lineCount; lineY++) {
                    const linePoints = [];
                    const lineColors = [];
                    const originalPositions = [];
                    
                    const yPos = (lineY - lineCount/2) * spacing;
                    
                    for (let pointX = 0; pointX < pointsPerLine; pointX++) {
                        const xPos = (pointX - pointsPerLine/2) * spacing;
                        
                        linePoints.push(new THREE.Vector3(xPos, yPos, -8));
                        originalPositions.push({ x: xPos, y: yPos });
                        
                        const colorHex = (pointX + lineY) % 2 === 0 ? this.colors.primary : this.colors.secondary;
                        const color = new THREE.Color(colorHex);
                        lineColors.push(color.r, color.g, color.b);
                    }
                    
                    const geometry = new THREE.BufferGeometry().setFromPoints(linePoints);
                    geometry.setAttribute('color', new THREE.Float32BufferAttribute(lineColors, 3));
                    
                    const material = new THREE.LineBasicMaterial({
                        vertexColors: true,
                        transparent: true,
                        opacity: 1
                    });
                    
                    const line = new THREE.Line(geometry, material);
                    this.robotGroup.add(line);
                    
                    this.lines.push({
                        mesh: line,
                        originalPositions: originalPositions
                    });
                }
            }

            setupHTMLOverlay() {
                if (this.overlayImageUrl && this.overlayImageUrl.length > 0) {
                    if (!this.overlayElement) {
                        this.overlayElement = document.createElement('div');
                        this.overlayElement.style.position = 'absolute';
                        this.overlayElement.style.left = '50%';
                        this.overlayElement.style.top = '50%';
                        this.overlayElement.style.transform = 'translate(-50%, -50%)';
                        this.overlayElement.style.zIndex = '1';
                        this.overlayElement.style.pointerEvents = 'none';
                        document.body.appendChild(this.overlayElement);
                    }
                    
                    // Clear existing content
                    const existingImg = this.overlayElement.querySelector('img');
                    if (existingImg) {
                        this.overlayElement.removeChild(existingImg);
                    }
                    
                    const img = document.createElement('img');
                    img.src = this.overlayImageUrl;
                    
                    // Full size to match the square canvas perfectly
                    const containerSize = Math.min(window.innerWidth, window.innerHeight);
                    img.style.width = containerSize + 'px';
                    img.style.height = containerSize + 'px';
                    img.style.objectFit = 'contain';
                    
                    this.overlayElement.appendChild(img);
                }
            }

            updateRobotSize() {
                if (this.overlayElement) {
                    const img = this.overlayElement.querySelector('img');
                    if (img) {
                        const containerSize = Math.min(window.innerWidth, window.innerHeight);
                        img.style.width = containerSize + 'px';
                        img.style.height = containerSize + 'px';
                    }
                }
            }

            createSphere(x, y, z, radius, color) {
                const geometry = new THREE.SphereGeometry(radius, 32, 32); // Higher segments for perfect circles
                const material = new THREE.MeshLambertMaterial({
                    color: color
                });
                
                const sphere = new THREE.Mesh(geometry, material);
                sphere.position.set(x, y, z);
                
                // Add random rotation speeds for each axis
                sphere.userData = {
                    rotationSpeed: {
                        x: (Math.random() - 0.5) * 0.02,
                        y: (Math.random() - 0.5) * 0.02,
                        z: (Math.random() - 0.5) * 0.02
                    }
                };
                
                this.robotGroup.add(sphere);
                this.spheres.push(sphere); // Track for rotation
                return sphere;
            }

                this.createSphere(-3.2, -3.5, 1.2, 0.25, this.colors.secondary);
                this.createSphere(-2.6, -3.5, 1.2, 0.25, this.colors.primary);
                this.createSphere(2.6, -3.5, 1.2, 0.25, this.colors.primary);
                this.createSphere(3.2, -3.5, 1.2, 0.25, this.colors.secondary);
            }

            createGrid() {
                // Remove existing grid if it exists
                if (this.grid) {
                    this.robotGroup.remove(this.grid);
                    this.grid.geometry.dispose();
                    this.grid.material.dispose();
                }

                // Locked grid settings
                const size = 7.3;
                const divisions = 20;
                const yPos = -5.1;
                const zPos = -2;
                const rotationX = -19;

                // Create grid geometry with distance-based alpha values
                const gridGeometry = new THREE.BufferGeometry();
                const vertices = [];
                const colors = [];
                
                const step = size / divisions;
                const halfSize = size / 2;
                const backgroundColor = new THREE.Color(0x000a25); // Background color
                const gridColor = new THREE.Color(this.colors.secondary); // Cyan grid color

                // Function to calculate fog opacity - simple distance from front edge
                const calculateFogOpacity = (worldPos) => {
                    // Distance along the grid's depth (Z direction after rotation)
                    const gridFrontZ = zPos + halfSize * Math.cos(THREE.MathUtils.degToRad(rotationX));
                    const distanceFromFront = gridFrontZ - worldPos.z;
                    
                    // Front of grid = opacity 1, back fades to 0
                    const fogStart = 0;    // No fog at front
                    const fogEnd = 4;      // Fully fogged at 4 units back
                    
                    const opacity = 1 - Math.max(0, Math.min(1, distanceFromFront / fogEnd));
                    return opacity;
                };

                // Horizontal lines (along X axis)
                for (let i = 0; i <= divisions; i++) {
                    const z1 = zPos - halfSize + (i * step);
                    const z2 = z1;
                    const x1 = -halfSize;
                    const x2 = halfSize;
                    
                    // Calculate positions after rotation
                    const rotRad = THREE.MathUtils.degToRad(rotationX);
                    const cos = Math.cos(rotRad);
                    const sin = Math.sin(rotRad);
                    
                    // Start point
                    const y1Rot = yPos * cos - (z1 - zPos) * sin;
                    const z1Rot = yPos * sin + (z1 - zPos) * cos + zPos;
                    const opacity1 = calculateFogOpacity({x: x1, y: y1Rot, z: z1Rot});
                    
                    // End point  
                    const y2Rot = yPos * cos - (z2 - zPos) * sin;
                    const z2Rot = yPos * sin + (z2 - zPos) * cos + zPos;
                    const opacity2 = calculateFogOpacity({x: x2, y: y2Rot, z: z2Rot});
                    
                    vertices.push(x1, y1Rot, z1Rot);
                    vertices.push(x2, y2Rot, z2Rot);
                    
                    // Interpolate colors based on fog
                    const color1 = gridColor.clone().lerp(backgroundColor, 1 - opacity1);
                    const color2 = gridColor.clone().lerp(backgroundColor, 1 - opacity2);
                    
                    colors.push(color1.r, color1.g, color1.b);
                    colors.push(color2.r, color2.g, color2.b);
                }

                // Vertical lines (along Z axis)
                for (let i = 0; i <= divisions; i++) {
                    const x1 = -halfSize + (i * step);
                    const x2 = x1;
                    const z1 = zPos - halfSize;
                    const z2 = zPos + halfSize;
                    
                    // Calculate positions after rotation
                    const rotRad = THREE.MathUtils.degToRad(rotationX);
                    const cos = Math.cos(rotRad);
                    const sin = Math.sin(rotRad);
                    
                    // Start point
                    const y1Rot = yPos * cos - (z1 - zPos) * sin;
                    const z1Rot = yPos * sin + (z1 - zPos) * cos + zPos;
                    const opacity1 = calculateFogOpacity({x: x1, y: y1Rot, z: z1Rot});
                    
                    // End point
                    const y2Rot = yPos * cos - (z2 - zPos) * sin;
                    const z2Rot = yPos * sin + (z2 - zPos) * cos + zPos;
                    const opacity2 = calculateFogOpacity({x: x2, y: y2Rot, z: z2Rot});
                    
                    vertices.push(x1, y1Rot, z1Rot);
                    vertices.push(x2, y2Rot, z2Rot);
                    
                    // Interpolate colors based on fog
                    const color1 = gridColor.clone().lerp(backgroundColor, 1 - opacity1);
                    const color2 = gridColor.clone().lerp(backgroundColor, 1 - opacity2);
                    
                    colors.push(color1.r, color1.g, color1.b);
                    colors.push(color2.r, color2.g, color2.b);
                }

                gridGeometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
                gridGeometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

                // Create grid material with vertex colors
                const gridMaterial = new THREE.LineBasicMaterial({
                    vertexColors: true,
                    transparent: true,
                    opacity: 0.6
                });

                // Create line segments
                this.grid = new THREE.LineSegments(gridGeometry, gridMaterial);
                this.robotGroup.add(this.grid);
            }

            createUIElements() {
                // Corner brackets like in the original image
                this.createCornerBracket(-4.5, 4.5, 1);  // Top left
                this.createCornerBracket(4.5, 4.5, 1);   // Top right
                this.createCornerBracket(-4.5, -4.5, 1); // Bottom left
                this.createCornerBracket(4.5, -4.5, 1);  // Bottom right

                // Cross marks on sides
                this.createCrossMark(-5, 0, 1);  // Left cross
                this.createCrossMark(5, 0, 1);   // Right cross

                // Bottom rectangular elements - only middle 2, no outer ones
                this.createRectangle(-2, -4.0, 2, 0.8, 0.2);
                this.createRectangle(2, -4.0, 2, 0.8, 0.2);

                // Additional geometric elements
                this.createDashLine(-5.5, 2, 1, true);  // Left vertical dashes
                this.createDashLine(5.5, 2, 1, true);   // Right vertical dashes
                this.createDashLine(0, 5, 1, false);    // Top horizontal dashes
            }

            createCornerBracket(x, y, z) {
                const group = new THREE.Group();
                
                // L-shaped bracket
                const hGeometry = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(-0.3, 0, 0),
                    new THREE.Vector3(0, 0, 0)
                ]);
                const vGeometry = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(0, -0.3, 0),
                    new THREE.Vector3(0, 0, 0)
                ]);
                
                const material = new THREE.LineBasicMaterial({
                    color: this.colors.secondary,
                    linewidth: 2
                });
                
                const hLine = new THREE.Line(hGeometry, material);
                const vLine = new THREE.Line(vGeometry, material);
                
                group.add(hLine, vLine);
                group.position.set(x, y, z);
                this.robotGroup.add(group);
            }

            createCrossMark(x, y, z) {
                const group = new THREE.Group();
                const size = 0.3;
                
                const line1Geometry = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(-size, -size, 0),
                    new THREE.Vector3(size, size, 0)
                ]);
                const line2Geometry = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(-size, size, 0),
                    new THREE.Vector3(size, -size, 0)
                ]);
                
                const material = new THREE.LineBasicMaterial({
                    color: this.colors.primary,
                    linewidth: 2
                });
                
                const line1 = new THREE.Line(line1Geometry, material);
                const line2 = new THREE.Line(line2Geometry, material);
                
                group.add(line1, line2);
                group.position.set(x, y, z);
                this.robotGroup.add(group);
            }

            createRectangle(x, y, z, width, height) {
                const geometry = new THREE.PlaneGeometry(width, height);
                const material = new THREE.MeshBasicMaterial({
                    color: this.colors.secondary, // Cyan color
                    transparent: false,
                    opacity: 1.0 // Full opacity
                });
                
                const rect = new THREE.Mesh(geometry, material);
                rect.position.set(x, y, z);
                this.robotGroup.add(rect);
                this.rectangles.push(rect); // Track for flashing
                return rect;
            }

            createDashLine(x, y, z, isVertical) {
                const group = new THREE.Group();
                const dashCount = 5;
                const dashLength = 0.2;
                const spacing = 0.1;
                
                for (let i = 0; i < dashCount; i++) {
                    const offset = i * (dashLength + spacing) - (dashCount * (dashLength + spacing)) / 2;
                    
                    let start, end;
                    if (isVertical) {
                        start = new THREE.Vector3(0, offset, 0);
                        end = new THREE.Vector3(0, offset + dashLength, 0);
                    } else {
                        start = new THREE.Vector3(offset, 0, 0);
                        end = new THREE.Vector3(offset + dashLength, 0);
                    }
                    
                    const geometry = new THREE.BufferGeometry().setFromPoints([start, end]);
                    const material = new THREE.LineBasicMaterial({
                        color: this.colors.primary,
                        linewidth: 1
                    });
                    
                    const dash = new THREE.Line(geometry, material);
                    group.add(dash);
                }
                
                group.position.set(x, y, z);
                this.robotGroup.add(group);
            }

            fractalNoise(x, y, time) {
                const octave1 = Math.sin(x * 0.5 + time * 0.003) * Math.cos(y * 0.3 + time * 0.004);
                const octave2 = Math.sin(x * 1.2 + time * 0.007) * Math.cos(y * 0.8 + time * 0.005) * 0.5;
                const octave3 = Math.sin(x * 2.1 + time * 0.012) * Math.cos(y * 1.5 + time * 0.009) * 0.25;
                const chaos = Math.sin((x + y) * 0.2 + time * 0.002) * Math.cos((x - y) * 0.15 + time * 0.003);
                
                return (octave1 + octave2 + octave3 + chaos * 0.3);
            }

            update(time) {
                // Fixed color flashing: alternates between magenta and cyan only
                const flashPhase = Math.sin(time * 0.02);
                const globalColor = flashPhase > 0 ? new THREE.Color(this.colors.primary) : new THREE.Color(this.colors.secondary);
                
                // Rotate all spheres
                this.spheres.forEach((sphere) => {
                    sphere.rotation.x += sphere.userData.rotationSpeed.x;
                    sphere.rotation.y += sphere.userData.rotationSpeed.y;
                    sphere.rotation.z += sphere.userData.rotationSpeed.z;
                });
                
                this.lines.forEach((lineData) => {
                    const { mesh, originalPositions } = lineData;
                    const newPoints = [];
                    const newColors = [];
                    
                    for (let i = 0; i < originalPositions.length; i++) {
                        const pos = originalPositions[i];
                        
                        const distanceFromCenter = Math.sqrt(pos.x * pos.x + pos.y * pos.y);
                        const wave = Math.sin(time * 0.001 - distanceFromCenter * 0.3) * 1;
                        const glitchOffset = this.fractalNoise(pos.x, pos.y, time) * 1.5;
                        const finalWave = wave + glitchOffset;
                        
                        newPoints.push(pos.x, pos.y, -8 + finalWave);
                        newColors.push(globalColor.r, globalColor.g, globalColor.b);
                    }
                    
                    mesh.geometry.setAttribute('position', new THREE.Float32BufferAttribute(newPoints, 3));
                    mesh.geometry.setAttribute('color', new THREE.Float32BufferAttribute(newColors, 3));
                    mesh.geometry.attributes.position.needsUpdate = true;
                    mesh.geometry.attributes.color.needsUpdate = true;
                });
            }

            updateRobotImage(imageUrl) {
                this.overlayImageUrl = imageUrl;
                this.setupHTMLOverlay();
            }

            dispose() {
                this.scene.remove(this.robotGroup);
                this.robotGroup.clear();
                this.lines = [];
                this.spheres = [];
                this.rectangles = [];
                if (this.grid) {
                    this.grid.geometry.dispose();
                    this.grid.material.dispose();
                }
            }
        }

        // Main code with fixed camera and square viewport
        let camera, scene, renderer, robotScene;
        const clock = new THREE.Clock();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000a25);

            // Calculate square size
            const containerSize = Math.min(window.innerWidth, window.innerHeight);
            
            camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000); // Always square aspect ratio
            camera.position.set(0, 0, 8);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(containerSize, containerSize);
            
            // Set full screen background
            document.body.style.backgroundColor = '#000a25';
            document.body.style.margin = '0';
            document.body.style.padding = '0';
            document.body.style.width = '100vw';
            document.body.style.height = '100vh';
            document.body.style.overflow = 'hidden';
            
            // Center the square canvas
            renderer.domElement.style.position = 'absolute';
            renderer.domElement.style.left = '50%';
            renderer.domElement.style.top = '50%';
            renderer.domElement.style.transform = 'translate(-50%, -50%)';
            
            document.body.appendChild(renderer.domElement);

            // Basic lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 7.5);
            scene.add(directionalLight);

            // Initialize robot scene
            robotScene = new RobotSceneAddition(scene);

            // Handle window resizing
            window.addEventListener('resize', onWindowResize);

            // Start animation
            animate();
        }

        function onWindowResize() {
            const containerSize = Math.min(window.innerWidth, window.innerHeight);
            
            // Keep camera aspect ratio as 1 (square)
            camera.aspect = 1;
            camera.updateProjectionMatrix();
            
            // Update renderer size to maintain square
            renderer.setSize(containerSize, containerSize);
            
            // Update robot size to fill new viewport
            robotScene.updateRobotSize();
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Update robot scene
            robotScene.update(clock.getElapsedTime() * 1000);
            
            // Render
            renderer.render(scene, camera);
        }

        // Initialize everything when page loads
        window.addEventListener('load', init);
    
    // Expose for dae hooks
    setTimeout(function() {
      window.animate = typeof animate == "function" ? animate : () => {}; 
      window.camera = typeof camera != "undefined" ? camera : undefined; 
      window.renderer = typeof renderer != "undefined" ? renderer : undefined; 
      window.scene = typeof scene != "undefined" ? scene : undefined; 
    }, 1000)
  </script>
