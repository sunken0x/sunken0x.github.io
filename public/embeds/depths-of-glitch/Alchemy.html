            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000a25;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #container {
            width: min(100vw, 100vh, 1000px);
            height: min(100vw, 100vh, 1000px);
            overflow: hidden;
            position: relative;
            max-width: 1000px;
            max-height: 1000px;

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
      
        class CardDanceEffect {
            constructor(container) {
                this.container = container;
                this.init();
            }

            init() {
                // Get container size
                const containerSize = Math.min(window.innerWidth, window.innerHeight, 1000);
                this.w = containerSize;
                this.h = containerSize;

                // Scene setup
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(75, this.w / this.h, 0.1, 1000);
                this.camera.position.set(0, 0, 20);
                this.camera.lookAt(0, 0, 0);

                // Renderer setup
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(this.w, this.h);
                this.renderer.setPixelRatio(window.devicePixelRatio);
                this.renderer.setClearColor(0x000a25);
                this.container.appendChild(this.renderer.domElement);

                // Create the dancing grid
                this.createGrid();
                
                // Create the overlay image using HTML approach
                this.createImageOverlay();

                // Start animation
                this.animate();

                // Handle resize
                window.addEventListener('resize', () => this.handleResize(), false);
            }

            createGrid() {
                const lineCount = 55;
                const pointsPerLine = 55;
                const spacing = 0.20;
                this.lines = [];

                for (let lineY = 0; lineY < lineCount; lineY++) {
                    const linePoints = [];
                    const lineColors = [];
                    const originalPositions = [];
                    
                    const yPos = (lineY - lineCount/2) * spacing;
                    
                    for (let pointX = 0; pointX < pointsPerLine; pointX++) {
                        const xPos = (pointX - pointsPerLine/2) * spacing;
                        
                        linePoints.push(new THREE.Vector3(xPos, yPos, 0));
                        originalPositions.push({ x: xPos, y: yPos });
                        
                        const colorHex = (pointX + lineY) % 2 === 0 ? 0xe224e7 : 0x2ce1f5;
                        const color = new THREE.Color(colorHex);
                        lineColors.push(color.r, color.g, color.b);
                    }
                    
                    const geometry = new THREE.BufferGeometry().setFromPoints(linePoints);
                    geometry.setAttribute('color', new THREE.Float32BufferAttribute(lineColors, 3));
                    
                    const material = new THREE.LineBasicMaterial({ 
                        vertexColors: true,
                        transparent: true,
                        opacity: 0.9
                    });
                    
                    const line = new THREE.Line(geometry, material);
                    this.scene.add(line);
                    
                    this.lines.push({
                        mesh: line,
                        originalPositions: originalPositions
                    });
                }
            }

                    const screenSize = Math.min(window.innerWidth, window.innerHeight);

            fractalNoise(x, y, time) {
                const octave1 = Math.sin(x * 0.5 + time * 0.003) * Math.cos(y * 0.3 + time * 0.004);
                const octave2 = Math.sin(x * 1.2 + time * 0.007) * Math.cos(y * 0.8 + time * 0.005) * 0.5;
                const octave3 = Math.sin(x * 2.1 + time * 0.012) * Math.cos(y * 1.5 + time * 0.009) * 0.25;
                const chaos = Math.sin((x + y) * 0.2 + time * 0.002) * Math.cos((x - y) * 0.15 + time * 0.003);
                
                return (octave1 + octave2 + octave3 + chaos * 0.3);
            }

            updateLines(time) {
                // Global color flashing
                const globalFlash = Math.sin(time * 0.02) > 0;
                const globalColor = globalFlash ? new THREE.Color(0xe224e7) : new THREE.Color(0x2ce1f5);
                
                this.lines.forEach((lineData) => {
                    const { mesh, originalPositions } = lineData;
                    const newPoints = [];
                    const newColors = [];
                    
                    for (let i = 0; i < originalPositions.length; i++) {
                        const pos = originalPositions[i];
                        
                        // Distance from center of grid (0,0)
                        const distanceFromCenter = Math.sqrt(pos.x * pos.x + pos.y * pos.y);
                        
                        // Main wave that ripples from center outward
                        const wave = Math.sin(time * 0.001 - distanceFromCenter * 0.6) * 2;
                        
                        // Add fractal noise glitch layer
                        const glitchOffset = this.fractalNoise(pos.x, pos.y, time) * 4;
                        const finalWave = wave + glitchOffset;
                        
                        newPoints.push(pos.x, pos.y, finalWave);
                        newColors.push(globalColor.r, globalColor.g, globalColor.b);
                    }
                    
                    mesh.geometry.setAttribute('position', new THREE.Float32BufferAttribute(newPoints, 3));
                    mesh.geometry.setAttribute('color', new THREE.Float32BufferAttribute(newColors, 3));
                    mesh.geometry.attributes.position.needsUpdate = true;
                    mesh.geometry.attributes.color.needsUpdate = true;
                });
            }

            animate(time = 0) {
                requestAnimationFrame((t) => this.animate(t));
                this.updateLines(time);
                this.renderer.render(this.scene, this.camera);
            }

            handleResize() {
                const newSize = Math.min(window.innerWidth, window.innerHeight, 1000);
                
                this.camera.aspect = 1;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(newSize, newSize);
                this.renderer.setPixelRatio(window.devicePixelRatio);
                
                // Update overlay size to full screen (like your clock)
                if (this.overlayElement) {
                    const img = this.overlayElement.querySelector('img');
                    if (img) {
                        const screenSize = Math.min(window.innerWidth, window.innerHeight);
                        img.style.width = screenSize + 'px';
                        img.style.height = screenSize + 'px';
                    }
                }
            }

            // Method to update overlay opacity
            setOverlayOpacity(opacity) {
                if (this.overlayElement) {
                    this.overlayElement.style.opacity = opacity;
                }
            }

            // Cleanup method
            dispose() {
                window.removeEventListener('resize', this.handleResize);
                this.renderer.dispose();
                if (this.container.contains(this.renderer.domElement)) {
                    this.container.removeChild(this.renderer.domElement);
                }
                if (this.overlayElement && document.body.contains(this.overlayElement)) {
                    document.body.removeChild(this.overlayElement);
                }
            }
        }

        // Initialize the effect
        const container = document.getElementById('container');
        const cardDance = new CardDanceEffect(container);
