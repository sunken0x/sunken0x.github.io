        function init() {
            // Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(colors.background);
            
            // Camera setup
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;
            
            // Renderer setup
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(colors.background, 1);
            document.body.appendChild(renderer.domElement);
            
            // Set body styles
            document.body.style.margin = '0';
            document.body.style.padding = '0';
            document.body.style.overflow = 'hidden';
            document.body.style.backgroundColor = colors.background;
            document.body.style.fontFamily = 'Courier New, monospace';
            
            // Main clock group
            clockGroup = new THREE.Group();
            scene.add(clockGroup);
            
            createHUDElements();
            createHTMLElements();
            setupOverlay();
            
            // Window resize listener
            window.addEventListener('resize', onWindowResize);
        }

        function createHUDElements() {
            // Create outer ring
            createOuterRing();
            
            // Create clock hands
            createClockHands();
            
            // Create grid lines
            createGridLines();
            
            // Create additional HUD elements
            createHUDDetails();
        }

        function createOuterRing() {
            const geometry = new THREE.RingGeometry(8, 8.1, 64);
            const material = new THREE.MeshBasicMaterial({ 
                color: currentColor,
                transparent: true,
                opacity: 0.8
            });
            outerRing = new THREE.Mesh(geometry, material);
            clockGroup.add(outerRing);
            
            // Add outer ring segments
            for (let i = 0; i < 60; i++) {
                const angle = (i / 60) * Math.PI * 2;
                const isHour = i % 5 === 0;
                const length = isHour ? 0.8 : 0.4;
                const width = isHour ? 0.08 : 0.04;
                
                const segmentGeometry = new THREE.BoxGeometry(width, length, 0.02);
                const segmentMaterial = new THREE.MeshBasicMaterial({ 
                    color: currentColor,
                    transparent: true,
                    opacity: isHour ? 1 : 0.6
                });
                const segment = new THREE.Mesh(segmentGeometry, segmentMaterial);
                
                segment.position.x = Math.cos(angle - Math.PI/2) * 7.5;
                segment.position.y = Math.sin(angle - Math.PI/2) * 7.5;
                segment.rotation.z = angle;
                
                clockGroup.add(segment);
            }

            // Add numbers
            for (let i = 1; i <= 12; i++) {
                const angle = ((i - 3) / 12) * Math.PI * 2;
                const numberGeometry = new THREE.BoxGeometry(0.15, 0.15, 0.02);
                const numberMaterial = new THREE.MeshBasicMaterial({ 
                    color: currentColor,
                    transparent: true,
                    opacity: 0.9
                });
                const number = new THREE.Mesh(numberGeometry, numberMaterial);
                
                number.position.x = Math.cos(angle) * 6.5;
                number.position.y = Math.sin(angle) * 6.5;
                
                clockGroup.add(number);
            }
        }

        function createClockHands() {
            // Hour hand (thick, short)
            const hourGeometry = new THREE.BoxGeometry(0.08, 3, 0.05);
            const hourMaterial = new THREE.MeshBasicMaterial({ 
                color: currentColor,
                transparent: true,
                opacity: 0.9
            });
            hourHand = new THREE.Mesh(hourGeometry, hourMaterial);
            hourHand.position.y = 1.5; // Offset to rotate from bottom
            
            const hourGroup = new THREE.Group();
            hourGroup.add(hourHand);
            clockGroup.add(hourGroup);
            hourHand.parent = hourGroup;

            // Minute hand (medium, longer)
            const minuteGeometry = new THREE.BoxGeometry(0.05, 4.5, 0.03);
            const minuteMaterial = new THREE.MeshBasicMaterial({ 
                color: currentColor,
                transparent: true,
                opacity: 0.8
            });
            minuteHand = new THREE.Mesh(minuteGeometry, minuteMaterial);
            minuteHand.position.y = 2.25; // Offset to rotate from bottom
            
            const minuteGroup = new THREE.Group();
            minuteGroup.add(minuteHand);
            clockGroup.add(minuteGroup);
            minuteHand.parent = minuteGroup;

            // Second hand (thin, longest)
            const secondGeometry = new THREE.BoxGeometry(0.02, 5.5, 0.02);
            const secondMaterial = new THREE.MeshBasicMaterial({ 
                color: colors.secondary,
                transparent: true,
                opacity: 0.9
            });
            secondHand = new THREE.Mesh(secondGeometry, secondMaterial);
            secondHand.position.y = 2.75; // Offset to rotate from bottom
            
            const secondGroup = new THREE.Group();
            secondGroup.add(secondHand);
            clockGroup.add(secondGroup);
            secondHand.parent = secondGroup;

            // Center dot
            const centerGeometry = new THREE.SphereGeometry(0.15, 16, 16);
            const centerMaterial = new THREE.MeshBasicMaterial({ 
                color: currentColor,
                transparent: true,
                opacity: 1
            });
            const centerDot = new THREE.Mesh(centerGeometry, centerMaterial);
            clockGroup.add(centerDot);
        }

        function createGridLines() {
            gridLines = new THREE.Group();
            
            // Vertical lines
            for (let i = -10; i <= 10; i += 0.5) {
                const geometry = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(i, -10, 0),
                    new THREE.Vector3(i, 10, 0)
                ]);
                const material = new THREE.LineBasicMaterial({ 
                    color: currentColor,
                    transparent: true,
                    opacity: 0.1
                });
                const line = new THREE.Line(geometry, material);
                gridLines.add(line);
            }
            
            // Horizontal lines
            for (let i = -10; i <= 10; i += 0.5) {
                const geometry = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(-10, i, 0),
                    new THREE.Vector3(10, i, 0)
                ]);
                const material = new THREE.LineBasicMaterial({ 
                    color: currentColor,
                    transparent: true,
                    opacity: 0.1
                });
                const line = new THREE.Line(geometry, material);
                gridLines.add(line);
            }
            
            clockGroup.add(gridLines);
        }

        function createHUDDetails() {
            // Corner brackets
            const bracketPositions = [
                { x: -9, y: 9 }, { x: 9, y: 9 },
                { x: -9, y: -9 }, { x: 9, y: -9 }
            ];
            
            bracketPositions.forEach(pos => {
                const bracket = createCornerBracket();
                bracket.position.set(pos.x, pos.y, 0);
                clockGroup.add(bracket);
            });
        }

        function createCornerBracket() {
            const group = new THREE.Group();
            
            // Horizontal line
            const hGeometry = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(-0.8, 0, 0),
                new THREE.Vector3(0, 0, 0)
            ]);
            const hMaterial = new THREE.LineBasicMaterial({ 
                color: currentColor,
                transparent: true,
                opacity: 0.6
            });
            const hLine = new THREE.Line(hGeometry, hMaterial);
            
            // Vertical line
            const vGeometry = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, -0.8, 0),
                new THREE.Vector3(0, 0, 0)
            ]);
            const vLine = new THREE.Line(vGeometry, hMaterial);
            
            group.add(hLine, vLine);
            return group;
        }

        function createHTMLElements() {
            // Time display
            timeDisplay = document.createElement('div');
            timeDisplay.style.position = 'absolute';
            timeDisplay.style.top = '50%';
            timeDisplay.style.left = '50%';
            timeDisplay.style.transform = 'translate(-50%, -50%)';
            timeDisplay.style.color = colors.primary;
            timeDisplay.style.fontSize = '3rem';
            timeDisplay.style.fontWeight = 'bold';
            timeDisplay.style.textShadow = `0 0 20px ${colors.primary}`;
            timeDisplay.style.zIndex = '100';
            timeDisplay.style.pointerEvents = 'none';
            timeDisplay.style.transition = 'color 0.1s ease';
            timeDisplay.style.fontFamily = 'Courier New, monospace';
            document.body.appendChild(timeDisplay);
        }

        function setupOverlay() {
            if (base64Overlay && base64Overlay.length > 0) {
                if (!overlayElement) {
                    overlayElement = document.createElement('div');
                    overlayElement.style.position = 'absolute';
                    overlayElement.style.top = '50%';
                    overlayElement.style.left = '50%';
                    overlayElement.style.transform = 'translate(-50%, -50%)';
                    overlayElement.style.zIndex = '50';
                    overlayElement.style.pointerEvents = 'none';
                    document.body.appendChild(overlayElement);
                }
                
                overlayElement.innerHTML = '';
                const img = document.createElement('img');
                img.src = base64Overlay;
                img.style.maxWidth = '100vw';
                img.style.maxHeight = '100vh';
                
                // Check if fullscreen (1000px+)
                if (window.innerWidth >= 1000 && window.innerHeight >= 1000) {
                    img.style.width = '1000px';
                    img.style.height = '1000px';
                } else {
                    img.style.width = Math.min(window.innerWidth, window.innerHeight) + 'px';
                    img.style.height = Math.min(window.innerWidth, window.innerHeight) + 'px';
                }
                
                img.style.objectFit = 'contain';
                overlayElement.appendChild(img);
            }
        }

        function updateClock() {
            const now = new Date();
            const hours = now.getHours() % 12;
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            const milliseconds = now.getMilliseconds();
            
            // Update time display
            const displayHours = now.getHours();
            if (timeDisplay) {
                timeDisplay.textContent = 
                    `${displayHours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
            
            // Calculate angles (subtract PI/2 to start at 12 o'clock)
            const hourAngle = ((hours + minutes/60) / 12) * Math.PI * 2 - Math.PI/2;
            const minuteAngle = ((minutes + seconds/60) / 60) * Math.PI * 2 - Math.PI/2;
            const secondAngle = ((seconds + milliseconds/1000) / 60) * Math.PI * 2 - Math.PI/2;
            
            // Update hand rotations
            if (hourHand && hourHand.parent) {
                hourHand.parent.rotation.z = hourAngle;
            }
            if (minuteHand && minuteHand.parent) {
                minuteHand.parent.rotation.z = minuteAngle;
            }
            if (secondHand && secondHand.parent) {
                secondHand.parent.rotation.z = secondAngle;
            }
        }

        function updateColors() {
            const currentTime = Date.now();
            if (currentTime - lastColorChange > colorChangeInterval) {
                currentColor = currentColor === colors.primary ? colors.secondary : colors.primary;
                lastColorChange = currentTime;
                
                // Update all materials except second hand
                clockGroup.traverse((child) => {
                    if (child.material && child !== secondHand) {
                        child.material.color.setStyle(currentColor);
                    }
                });
                
                // Keep second hand secondary color
                if (secondHand && secondHand.material) {
                    secondHand.material.color.setStyle(colors.secondary);
                }
                
                // Update time display color and border
                if (timeDisplay) {
                    timeDisplay.style.color = currentColor;
                    timeDisplay.style.textShadow = `0 0 20px ${currentColor}`;
                    timeDisplay.style.border = `0px solid ${currentColor}`;
                }
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            // Update overlay size
            setupOverlay();
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const elapsedTime = clock.getElapsedTime();
            
            // Add subtle floating animation
            clockGroup.position.y = Math.sin(elapsedTime * 1000 * 0.001) * 0.1;
            
            // Update clock and colors
            updateClock();
            updateColors();
            
            // Add noise-like movement to grid
            if (gridLines) {
                gridLines.rotation.z = Math.sin(elapsedTime * 1000 * 0.0005) * 0.01;
            }
            
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
