      font-weight: 400;
      line-height: 30px;
      letter-spacing: -1.5px;
    }

      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }

function preload() {
  imgUnderlayBase64 = loadImage(base64BlueUnderlay);
  imgOverlayBase64 = loadImage(base64RedOverlay);
}

function setup() {
  cnv = createCanvas(windowWidth, windowHeight);
  imageMode(CENTER);
  // detect touch-capable devices once
  window.isMobile = (('ontouchstart' in window) || navigator.maxTouchPoints > 0) && width < 767;

  cnv.elt.style.touchAction = 'none';
  cnv.elt.addEventListener('touchmove', e => {
    e.preventDefault();
  }, { passive: false });

  // Pre-load color objects for efficiency
  color1Obj = color(color1Hex);
  color2Obj = color(color2Hex);
  currentColor = color1Obj;

  calculateDisplayParams();
  initializeNodes();
}

function calculateDisplayParams() {
  displaySquareSize = min(windowWidth, windowHeight);
  displayOffsetX = (windowWidth - displaySquareSize) / 2;
  displayOffsetY = (windowHeight - displaySquareSize) / 2;
}

function initializeNodes() {
  nodes = []; // Clear existing nodes if resizing
  // Create nodes for all lines and sub-lines
  for (let line = 0; line < numLines; line++) {
    nodes[line] = [];
    for (let subLine = 0; subLine < numSubLines; subLine++) {
      nodes[line][subLine] = [];

      // Position lines evenly across the width, with an increased margin from edges
      let margin = displaySquareSize * 0.08; // Increased from 0.05 to 0.08 (5% + 3%)
      let baseX = map(line, 0, numLines - 1, margin, displaySquareSize - margin);
      let offsetX = subLineOffsets[subLine] * (displaySquareSize / 500); // Scale offset with displaySquareSize
      let finalX = baseX + offsetX;

      for (let r = 0; r < numRows; r++) {
        let y = map(r, 0, numRows - 1, 0, displaySquareSize);
        nodes[line][subLine][r] = new Node(finalX, y);
      }
    }
  }
}

function draw() {
  background('#000a25'); // This now covers the full window

  // --- UNDERLAY (below lines) ---
  // Draw the base64 underlay image, scaled to cover the full window
  image(
    imgUnderlayBase64,
    width / 2,
    height / 2,
    imgUnderlayBase64.width * min(width / imgUnderlayBase64.width, height / imgUnderlayBase64.height, 1),
    imgUnderlayBase64.height * min(width / imgUnderlayBase64.width, height / imgUnderlayBase64.height, 1)
  );

  // Translate and scale to draw the square content in the center
  push();
  translate(displayOffsetX, displayOffsetY);

  if (millis() - lastColorChangeTime > colorChangeInterval) {
    if (currentColor === color1Obj) {
      currentColor = color2Obj;
    } else {
      currentColor = color1Obj;
    }
    lastColorChangeTime = millis();
  }

  noFill();
  strokeWeight(2);
  stroke(currentColor);

  // Iterate through each sub-line and draw its segments
  for (let line = 0; line < numLines; line++) {
    for (let subLine = 0; subLine < numSubLines; subLine++) {
      drawMeshSingle(line, subLine);
    }
  }
  pop(); // End of square content transformation

  // --- OVERLAY (above lines) ---
  // Draw the base64 overlay image, scaled to cover the full window
  image(
    imgOverlayBase64,
    width / 2,
    height / 2,
    imgOverlayBase64.width * min(width / imgOverlayBase64.width, height / imgOverlayBase64.height, 1),
    imgOverlayBase64.height * min(width / imgOverlayBase64.width, height / imgOverlayBase64.height, 1)
  );
}

function drawMeshSingle(lineIndex, subLineIndex) {
  let speed = glitchSpeeds[subLineIndex];
  let offset = glitchOffsets[subLineIndex];

  // Make glitch patterns unique per line by adding line-specific offset
  let lineOffset = lineIndex * 123.456;

  // Pre-calculate glitch values for each node in this sub-line
  let currentGlitchX = [];
  let currentHorizontalVariation = [];

  for (let r = 0; r < numRows; r++) {
    // Create smoke-like glitch effects that travel DOWN - unique per line
    let smokeTime = frameCount * speed;
    let smokeY = (r / numRows) * 6 + smokeTime + offset * 0.01 + lineOffset * 0.001;

    // Multiple layers of glitch effects - each line gets different pattern
    // Increased multipliers for more chaotic movement
    let glitchX1 = noise(smokeY * 2.5 + lineOffset * 0.1, frameCount * 0.009 + offset + lineOffset) * 2 - 1; // frameCount speed slowed by 25%
    let glitchX2 = noise(smokeY * 8 + lineOffset * 0.2, frameCount * 0.0225 + offset + 100 + lineOffset) * 2 - 1; // frameCount speed slowed by 25%
    let glitchX3 = noise(smokeY * 20 + lineOffset * 0.3, frameCount * 0.0375 + offset + 200 + lineOffset) * 2 - 1; // frameCount speed slowed by 25%

    // Combine glitch layers with different intensities, increased overall magnitude
    currentGlitchX[r] = (glitchX1 * 25 + glitchX2 * 15 + glitchX3 * 5) * (displaySquareSize / 1000);

    // Add some horizontal variation - unique per line, increased magnitude
    currentHorizontalVariation[r] = sin(smokeY * 3.5 + frameCount * 0.015 + offset * 0.01 + lineOffset * 0.05) * 10 * (displaySquareSize / 1000); // frameCount speed slowed by 25%
  }

  // Now draw the lines using the pre-calculated glitch values
  for (let r = 0; r < numRows - 1; r++) {
    let node = nodes[lineIndex][subLineIndex][r];
    let nextNode = nodes[lineIndex][subLineIndex][r + 1];

    line(
      node.initialX + currentGlitchX[r] + currentHorizontalVariation[r],
      node.initialY,
      nextNode.initialX + currentGlitchX[r + 1] + currentHorizontalVariation[r + 1],
      nextNode.initialY
    );
  }
}

class Node {
  constructor(x, y) {
    this.initialX = x;
    this.initialY = y;
    this.x = x;
    this.y = y;
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  calculateDisplayParams();
  initializeNodes(); // Re-initialize nodes with new displaySquareSize
}
  </script>
