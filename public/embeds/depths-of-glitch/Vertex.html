        const cameraSettings = {
            x: 0, y: 1, z: 100, lookAtY: 20
        };

        // Initialize and start
        init();

        function init() {
            try {
                // Scene setup
                scene = new THREE.Scene();
                scene.background = new THREE.Color(colors.background);
                
                // Camera setup
                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
                camera.position.set(cameraSettings.x, cameraSettings.y, cameraSettings.z);
                camera.lookAt(0, cameraSettings.lookAtY, 0);
                
                // Renderer setup
                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setClearColor(colors.background, 1);
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                document.body.appendChild(renderer.domElement);
                
                // Set body styles
                document.body.style.margin = '0';
                document.body.style.padding = '0';
                document.body.style.overflow = 'hidden';
                document.body.style.backgroundColor = colors.background;
                
                // Create grid group
                gridGroup = new THREE.Group();
                scene.add(gridGroup);
                
                // Create scene elements
                createStarField();
                createFloorGrid();
                createCircuitPoints();
                createTwoBoxes();
                setupOverlay();
                
                // Window resize listener
                window.addEventListener('resize', onWindowResize);
                
            } catch (error) {
                console.error('Init error:', error);
            }
        }

        function createStarField() {
            const starGeometry = new THREE.BufferGeometry();
            const starVertices = [];
            
            // Create 3000 stars scattered in space
            for (let i = 0; i < 3000; i++) {
                const x = (Math.random() - 0.5) * 2000;
                const y = (Math.random() - 0.5) * 1000;
                const z = (Math.random() - 0.5) * 2000;
                starVertices.push(x, y, z);
            }
            
            starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
            
            const starMaterial = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 1,
                transparent: true,
                opacity: 0.6
            });
            
            starField = new THREE.Points(starGeometry, starMaterial);
            starField.position.z = -200; // Position behind the grid
            scene.add(starField);
        }

        function createFloorGrid() {
            const gridSize = 200;
            const divisions = 100;
            const opacity = 0.8;
            const step = gridSize / divisions;
            
            // Create a background plane to block stars from showing through grid
            const backgroundGeometry = new THREE.PlaneGeometry(gridSize * 2, gridSize * 2);
            const backgroundMaterial = new THREE.MeshBasicMaterial({
                color: new THREE.Color(colors.background),
                side: THREE.DoubleSide
            });
            const backgroundPlane = new THREE.Mesh(backgroundGeometry, backgroundMaterial);
            backgroundPlane.rotation.x = -Math.PI / 2;
            backgroundPlane.position.y = -0.1; // Slightly below the grid
            scene.add(backgroundPlane);
            
            // Create grid lines
            for (let i = 0; i <= divisions; i++) {
                const z = (i - divisions/2) * step;
                const geometry = new THREE.BufferGeometry();
                const points = [
                    new THREE.Vector3(-gridSize/2, 0, z),
                    new THREE.Vector3(gridSize/2, 0, z)
                ];
                geometry.setFromPoints(points);
                
                const material = new THREE.LineBasicMaterial({ 
                    color: new THREE.Color(currentColor),
                    transparent: true,
                    opacity: opacity
                });
                gridMaterials.push(material);
                
                const line = new THREE.Line(geometry, material);
                gridGroup.add(line);
            }
            
            for (let i = 0; i <= divisions; i++) {
                const x = (i - divisions/2) * step;
                const geometry = new THREE.BufferGeometry();
                const points = [
                    new THREE.Vector3(x, 0, -gridSize/2),
                    new THREE.Vector3(x, 0, gridSize/2)
                ];
                geometry.setFromPoints(points);
                
                const material = new THREE.LineBasicMaterial({ 
                    color: new THREE.Color(currentColor),
                    transparent: true,
                    opacity: opacity
                });
                gridMaterials.push(material);
                
                const line = new THREE.Line(geometry, material);
                gridGroup.add(line);
            }
        }

                    color: new THREE.Color(currentColor),
                    transparent: true,
                    opacity: 1.0
                });
                gridMaterials.push(material);
                
                const point = new THREE.Mesh(pointGeometry, material);
                
                // Distribute across entire grid area
                const startX = Math.floor((Math.random() - 0.5) * 180) * 1;
                const startZ = Math.floor((Math.random() - 0.5) * 180) * 1;
                
                point.position.set(startX, 0.3, startZ);
                point.userData = {
                    targetX: startX,
                    targetZ: startZ,
                    speed: 1.2 + Math.random() * 0.8,
                    gridStep: 2,
                    moving: false
                };
                
                circuitPoints.push(point);
                gridGroup.add(point);
            }
        }

        function createTwoBoxes() {
            try {
                // LOCKED COORDINATES - Box 1 on left, Box 2 mirrored on right
                const boxY = 24;
                const boxZ = 50;
                const boxSize = 4;
                
                // Create first box (left side) - FILLED with 70% opacity
                const geometry1 = new THREE.BoxGeometry(boxSize, boxSize, boxSize);
                const material1 = new THREE.MeshBasicMaterial({
                    color: new THREE.Color(currentColor),
                    transparent: true,
                    opacity: 1
                });
                gridMaterials.push(material1);
                
                wireframeBox1 = new THREE.Mesh(geometry1, material1);
                wireframeBox1.position.set(-16, boxY, boxZ); // Left side
                scene.add(wireframeBox1);
                
                // Create second box (right side) - FILLED with 70% opacity
                const geometry2 = new THREE.BoxGeometry(boxSize, boxSize, boxSize);
                const material2 = new THREE.MeshBasicMaterial({
                    color: new THREE.Color(currentColor),
                    transparent: true,
                    opacity: 1
                });
                gridMaterials.push(material2);
                
                wireframeBox2 = new THREE.Mesh(geometry2, material2);
                wireframeBox2.position.set(+16, boxY, boxZ); // Right side (mirrored)
                scene.add(wireframeBox2);
                
            } catch (error) {
                console.error('Box creation error:', error);
            }
        }

        function updateCircuitPoints() {
            for (let i = 0; i < circuitPoints.length; i++) {
                const point = circuitPoints[i];
                const userData = point.userData;
                
                if (!userData.moving) {
                    const directions = [
                        { x: userData.gridStep, z: 0 },
                        { x: 0, z: userData.gridStep },
                        { x: -userData.gridStep, z: 0 },
                        { x: 0, z: -userData.gridStep }
                    ];
                    
                    const randomDir = directions[Math.floor(Math.random() * 4)];
                    userData.targetX = point.position.x + randomDir.x;
                    userData.targetZ = point.position.z + randomDir.z;
                    
                    // Better boundary checking - keep well within grid bounds
                    userData.targetX = Math.max(-85, Math.min(85, userData.targetX));
                    userData.targetZ = Math.max(-85, Math.min(85, userData.targetZ));
                    userData.moving = true;
                }
                
                const dx = userData.targetX - point.position.x;
                const dz = userData.targetZ - point.position.z;
                const distance = Math.sqrt(dx * dx + dz * dz);
                
                if (distance < 0.5) { // Larger threshold to prevent getting stuck
                    point.position.x = userData.targetX;
                    point.position.z = userData.targetZ;
                    userData.moving = false;
                    
                    // Force immediate new direction if stuck at boundary
                    if (Math.abs(point.position.x) > 80 || Math.abs(point.position.z) > 80) {
                        userData.moving = false; // This will trigger new direction next frame
                    }
                } else {
                    const moveSpeed = userData.speed * circuitSpeed * 4;
                    point.position.x += (dx / distance) * moveSpeed;
                    point.position.z += (dz / distance) * moveSpeed;
                }
                
                // Minimal floating animation
                point.position.y = 0.3 + Math.sin(animationTime * 3 + i) * 0.05;
            }
        }

        function setupOverlay() {
            if (base64Overlay && base64Overlay.length > 0) {
                if (!overlayElement) {
                    overlayElement = document.createElement('div');
                    overlayElement.style.position = 'absolute';
                    overlayElement.style.top = '50%';
                    overlayElement.style.left = '50%';
                    overlayElement.style.transform = 'translate(-50%, -50%)';
                    overlayElement.style.zIndex = '20';
                    overlayElement.style.pointerEvents = 'none';
                    document.body.appendChild(overlayElement);
                }
                
                // Safer content replacement
                const existingImg = overlayElement.querySelector('img');
                if (existingImg) {
                    overlayElement.removeChild(existingImg);
                }
                
                const img = document.createElement('img');
                img.src = base64Overlay.startsWith('data:') ? base64Overlay : 'data:image/svg+xml;base64,' + base64Overlay;
                
                const size = Math.min(window.innerWidth, window.innerHeight);
                img.style.width = size + 'px';
                img.style.height = size + 'px';
                img.style.objectFit = 'contain';
                
                overlayElement.appendChild(img);
            }
        }

        function updateColors() {
            const currentTime = Date.now();
            if (currentTime - lastColorChange > colorChangeInterval) {
                currentColor = currentColor === colors.primary ? colors.secondary : colors.primary;
                lastColorChange = currentTime;
                
                for (let i = 0; i < gridMaterials.length; i++) {
                    if (gridMaterials[i] && gridMaterials[i].color) {
                        gridMaterials[i].color.set(currentColor);
                    }
                }
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            setupOverlay();
        }

        function animate() {
            try {
                requestAnimationFrame(animate);
                
                const delta = clock.getDelta();
                animationTime += delta;
                
                updateCircuitPoints();
                
                // Slowly rotate the star field
                if (starField) {
                    starField.rotation.y += 0.0005;
                    starField.rotation.x += 0.0002;
                }
                
                // Rotate both boxes with different speeds
                if (wireframeBox1) {
                    wireframeBox1.rotation.x += 0.01;
                    wireframeBox1.rotation.y += 0.015;
                    wireframeBox1.rotation.z += 0.008;
                }
                
                if (wireframeBox2) {
                    wireframeBox2.rotation.x += 0.012;
                    wireframeBox2.rotation.y += 0.018;
                    wireframeBox2.rotation.z += 0.006;
                }
                
                updateColors();
                renderer.render(scene, camera);
                
            } catch (error) {
                console.error('Animation error:', error);
            }
        }

        // Global function to update base64 overlay
        window.updateBase64SVG = function(base64String) {
            base64Overlay = base64String;
            setupOverlay();
        };
    </script>
</body>
