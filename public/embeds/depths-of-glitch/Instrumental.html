function preload() {
  if (base64Image && base64Image.length > 0) {
    backgroundImage = loadImage(base64Image);
  }
  if (base64ImageForeground && base64ImageForeground.length > 0) {
    foregroundImage = loadImage(base64ImageForeground);
  }

function setup() {
  cnv = createCanvas(windowWidth, windowHeight);
  imageMode(CENTER); // This is crucial!
  window.isMobile = (('ontouchstart' in window) || navigator.maxTouchPoints > 0) && width < 767;
  cnv.elt.style.touchAction = 'none';
  cnv.elt.addEventListener('touchmove', e => {
    e.preventDefault();
  }, { passive: false });

  document.body.style.margin = '0';
  document.body.style.overflow = 'hidden';
  document.body.style.backgroundColor = '#000a25';

  // Initialize lines
  nodeSpacingX = width / (numNodesPerLine + 1);
  for (let l = 0; l < numLines; l++) {
    lineNodes[l] = [];
    for (let n = 0; n < numNodesPerLine; n++) {
      let x = map(n, 0, numNodesPerLine - 1, width * 0.1, width * 0.9);
      let y = map(l, 0, numLines - 1, height * 0.2, height * 0.8);
      lineNodes[l][n] = new Node(x, y);
    }
  }

  // Initialize stars for 3D effect
  for (let i = 0; i < numStars; i++) {
    stars.push({
      x: random(-width / 2, width / 2),
      y: random(-height / 2, height / 2),
      z: random(starZRange),
      pz: random(starZRange), // Previous z for drawing trails
      speedFactor: random(0.5, 2) // Individual speed factor for variety
    });
  }

  // Create play/pause button
  playPauseButton = createIconButton('▶️', 'Play/Pause', togglePlayPause);
  playPauseButton.style('position', 'absolute');
  playPauseButton.style('left', '30px');
  playPauseButton.style('bottom', '30px');
  playPauseButton.style('z-index', '1000');
  playPauseButton.style('opacity', '0');
  playPauseButton.style('visibility', 'hidden');
  if (isPlaying) {
    playPauseButton.html('⏸️');
  } else {
    playPauseButton.html('▶️');
  }

  // Create upload button
  uploadInput = createFileInput(handleFile);
  uploadInput.style('display', 'none');

  let uploadButtonWrapper = createDiv('');
  uploadButtonWrapper.style('position', 'absolute');
  uploadButtonWrapper.style('right', '30px');
  uploadButtonWrapper.style('bottom', '30px');
  uploadButtonWrapper.style('width', '60px');
  uploadButtonWrapper.style('height', '60px');
  uploadButtonWrapper.style('border-radius', '50%');
  uploadButtonWrapper.style('background-color', 'rgba(0, 150, 200, 0.7)');
  uploadButtonWrapper.style('box-shadow', '0 4px 15px rgba(0, 0, 0, 0.3)');
  uploadButtonWrapper.style('cursor', 'pointer');
  uploadButtonWrapper.style('display', 'flex');
  uploadButtonWrapper.style('justify-content', 'center');
  uploadButtonWrapper.style('align-items', 'center');
  uploadButtonWrapper.style('font-size', '28px');
  uploadButtonWrapper.style('color', 'white');
  uploadButtonWrapper.style('transition', 'all 0.2s ease');
  uploadButtonWrapper.style('z-index', '1000');
  uploadButtonWrapper.html('📂');
  uploadButtonWrapper.attribute('title', 'Choose Audio File');

  uploadButtonWrapper.mousePressed(() => uploadInput.elt.click());
  uploadButtonWrapper.mouseOver(() => uploadButtonWrapper.style('background-color', 'rgba(0, 180, 230, 0.9)').style('transform', 'scale(1.05)'));
  uploadButtonWrapper.mouseOut(() => uploadButtonWrapper.style('background-color', 'rgba(0, 150, 200, 0.7)').style('transform', 'scale(1)'));

  uploadInput.position(uploadButtonWrapper.x, uploadButtonWrapper.y);
  uploadInput.elt.style.width = uploadButtonWrapper.width + 'px';
  uploadInput.elt.style.height = uploadButtonWrapper.height + 'px';
  uploadInput.elt.style.opacity = '0';
  uploadInput.elt.style.position = 'absolute';
  uploadInput.elt.style.left = '0';
  uploadInput.elt.style.top = '0';
  uploadInput.elt.style.cursor = 'pointer';
  uploadInput.elt.style.zIndex = '1001';

  uploadInput.wrapper = uploadButtonWrapper;

  amplitude = new p5.Amplitude();
  fft = new p5.FFT();

  // Load the default audio file here
  soundFile = loadSound(DEFAULT_AUDIO_URL, soundLoaded);

  currentColor = color(color1);
  lastInteractionTime = millis();

  cnv.elt.addEventListener('mousemove', () => lastInteractionTime = millis());
  cnv.elt.addEventListener('touchmove', () => lastInteractionTime = millis());
  document.addEventListener('mousemove', () => lastInteractionTime = millis());
  document.addEventListener('touchstart', () => lastInteractionTime = millis());
}

function createIconButton(icon, title, callback) {
  let button = createButton(icon);
  button.style('width', '50px');
  button.style('height', '50px');
  button.style('border-radius', '50%');
  button.style('background-color', 'rgba(80, 80, 110, 0.8)');
  button.style('color', 'white');
  button.style('border', 'none');
  button.style('font-size', '24px');
  button.style('cursor', 'pointer');
  button.style('display', 'flex');
  button.style('justify-content', 'center');
  button.style('align-items', 'center');
  button.style('margin', '0 5px');
  button.style('box-shadow', '0 2px 8px rgba(0, 0, 0, 0.2)');
  button.style('transition', 'all 0.2s ease');
  button.attribute('title', title);
  button.mousePressed((event) => {
    event.stopPropagation();
    callback();
    lastInteractionTime = millis();
  });
  button.elt.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: true });
  button.elt.addEventListener('touchend', (e) => e.stopPropagation(), { passive: true });

  button.mouseOver(() => button.style('background-color', 'rgba(120, 120, 150, 0.9)').style('transform', 'scale(1.1)'));
  button.mouseOut(() => {
    button.style('background-color', 'rgba(80, 80, 110, 0.8)').style('transform', 'scale(1)');
  });
  return button;
}

function draw() {
  background('#000a25');

  // Draw background image with proper sizing
  if (backgroundImage) {
    let imgSize = min(width, height);
    image(backgroundImage, width / 2, height / 2, imgSize, imgSize);
  }

  // Get audio level for reactivity
  let level = 0;
  if (isPlaying && soundFile && soundFile.isLoaded()) {
    level = amplitude.getLevel();
  }

  // Draw 3D stars flying away with flashing lines
  push();
  translate(width / 2, height / 2); // Center for 3D projection
  
  for (let i = 0; i < numStars; i++) {
    let star = stars[i];

    // Update z position to simulate flying away
    star.z += starSpeed * star.speedFactor; // Use the global starSpeed multiplied by individual factor
    if (star.z > starZRange) {
      star.z = 0; // Reset to front
      star.x = random(-width / 2, width / 2);
      star.y = random(-height / 2, height / 2);
      star.pz = 0; // Reset previous z as well
    }

    // Perspective projection
    let perspective = width; // A larger value makes the 3D effect less pronounced
    let scale = perspective / (star.z + perspective);
    let screenX = star.x * scale;
    let screenY = star.y * scale;

    // Calculate size and brightness based on z
    let starSize = map(star.z, 0, starZRange, 4, 0.5); // Smaller when further away
    let alpha = map(star.z, 0, starZRange, 255, 50); // Dimmer when further away

    // Draw the star (circle)
    fill(44, 225, 245, alpha); // Cyan color with varying alpha
    noStroke(); // Ensure no stroke on the star itself
    ellipse(screenX, screenY, starSize, starSize);

    // Draw the flashing line/trail
    let prevScale = perspective / (star.pz + perspective);
    let prevScreenX = star.x * prevScale;
    let prevScreenY = star.y * prevScale;
    
    // Music reactive flashing lines
    let trailAlpha = alpha * 0.5;
    let trailWeight = starSize * 0.5;

    stroke(44, 225, 245, trailAlpha); // Cyan color for trail with reactive alpha
    strokeWeight(trailWeight);
    line(prevScreenX, prevScreenY, screenX, screenY);
    
    star.pz = star.z; // Update previous z for next frame
  }
  pop();

  if (millis() - lastColorChangeTime > colorChangeInterval) {
    if (currentColor.toString() === color(color1).toString()) {
      currentColor = color(color2);
    } else {
      currentColor = color(color1);
    }
    lastColorChangeTime = millis();
  }

  let waveform = [];
  if (isPlaying && soundFile && soundFile.isLoaded()) {
    waveform = fft.waveform();
  }

  // Use locked coordinate values instead of sliders
  let currentLineYOffset = map(LOCKED_LINE_Y_OFFSET, 0, 1, -height * 0.3, height * 0.3);
  let lineSpacing = map(LOCKED_LINE_SPACING, 0.01, 3, height * 0.01, height * 0.8);
  let linesXOffset = map(LOCKED_LINES_X_POSITION, 0, 1, -width * 0.3, width * 0.3);
  let linesYOffset = map(LOCKED_LINES_Y_POSITION, 0, 1, -height * 0.3, height * 0.3);
  let lineLength = LOCKED_LINE_LENGTH;
  
  // Calculate the center point for lines
  let linesCenterY = height * 0.5 + linesYOffset;
  let startY = linesCenterY - (lineSpacing * (numLines - 1)) / 2;

  // Draw audio-reactive lines
  push(); // Save drawing state for lines
  noFill();
  strokeWeight(3);
  stroke(currentColor);

  for (let l = 0; l < numLines; l++) {
    beginShape();
    for (let n = 0; n < numNodesPerLine; n++) {
      let baseHeight = startY + (l * lineSpacing) + currentLineYOffset;

      let displacement = 0;
      if (isPlaying) {
        let waveformIndex = floor(map(n, 0, numNodesPerLine - 1, 0, waveform.length - 1));
        displacement = map(waveform[waveformIndex], -1, 1, -level * 100, level * 100); // Use the overall level for lines
      }

      // Calculate line length - centered around the middle of the screen
      let lineStart = 0.5 - lineLength/2;
      let lineEnd = 0.5 + lineLength/2;
      let x = map(n, 0, numNodesPerLine - 1, width * lineStart + linesXOffset, width * lineEnd + linesXOffset);
      let y = baseHeight + displacement;
      vertex(x, y);
    }
    endShape();
  }
  pop(); // Restore drawing state

  // Draw foreground image AFTER all the lines and stars
  if (foregroundImage) {
    let imgSize = min(width, height);
    image(foregroundImage, width / 2, height / 2, imgSize, imgSize);
  }

  // Draw playing progress bar when UI is visible
  if (isPlaying && soundFile && soundFile.isLoaded()) {
    let progress = soundFile.currentTime() / soundFile.duration();
    if (!isNaN(progress) && progress >= 0) {
      push();
      // Bar background
      fill(255, 255, 255, 50 * uiContainerOpacity);
      noStroke();
      rect(0, height - 4, width, 4);
      
      // Progress bar
      fill(255, 255, 255, 180 * uiContainerOpacity);
      rect(0, height - 4, width * progress, 4);
      pop();
    }
  }

  let targetOpacity = 0;
  // UI should only appear if there's interaction
  if (millis() - lastInteractionTime < fadeDuration || isOverUI()) {
    targetOpacity = 1;
  }

  uiContainerOpacity = lerp(uiContainerOpacity, targetOpacity, fadeSpeed);

  // Music controls always visible/fading together
  playPauseButton.style('opacity', uiContainerOpacity);
  playPauseButton.style('visibility', uiContainerOpacity > 0.05 ? 'visible' : 'hidden');
  playPauseButton.style('pointer-events', uiContainerOpacity > 0.1 ? 'auto' : 'none');

  uploadInput.wrapper.style('opacity', uiContainerOpacity);
  uploadInput.wrapper.style('visibility', uiContainerOpacity > 0.05 ? 'visible' : 'hidden');
  uploadInput.wrapper.style('pointer-events', uiContainerOpacity > 0.1 ? 'auto' : 'none');

  if (uploadInput.elt) {
    uploadInput.elt.style.pointerEvents = uiContainerOpacity > 0.1 ? 'auto' : 'none';
  }
}

class Node {
  constructor(x, y) {
    this.initialX = x;
    this.initialY = y;
    this.x = x;
    this.y = y;
  }
}

function handleFile(file) {
  print('File type:', file.type);
  if (file.type === 'audio') {
    if (soundFile) {
      soundFile.stop();
    }
    soundFile = loadSound(file.data, soundLoaded);
  } else {
    print('Not an audio file. Please upload an audio file.');
  }
}

function soundLoaded() {
  print('Sound loaded successfully!');
  amplitude.setInput(soundFile);
  fft.setInput(soundFile);
  soundFile.loop(); // Start looping immediately
  isPlaying = true; // Set playing status to true
  playPauseButton.html('⏸️'); // Show pause icon
  lastInteractionTime = millis();
}

function togglePlayPause() {
  if (soundFile && soundFile.isLoaded()) {
    if (isPlaying) {
      soundFile.pause();
      playPauseButton.html('▶️');
      isPlaying = false;
    } else {
      soundFile.loop(); // Start looping when play is pressed
      playPauseButton.html('⏸️');
      isPlaying = true;
    }
    lastInteractionTime = millis();
  }
}

function handleClick() {
  lastInteractionTime = millis();
}

function mouseClicked(event) {
  if (!window.isMobile || (window.isMobile && !isOverAnyP5Element())) {
    handleClick();
  }
}

function touchEnded(event) {
  if (!isOverAnyP5Element()) {
    handleClick();
    return false;
  }
  return true;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);

  // Reinitialize lines to fit new window size
  nodeSpacingX = width / (numNodesPerLine + 1);
  for (let l = 0; l < numLines; l++) {
    for (let n = 0; n < numNodesPerLine; n++) {
      let x = map(n, 0, numNodesPerLine - 1, width * 0.1, width * 0.9);
      let y = map(l, 0, numLines - 1, height * 0.2, height * 0.8);
      lineNodes[l][n].initialX = x;
      lineNodes[l][n].initialY = y;
    }
  }

  // Reinitialize stars for new window size and 3D effect
  stars = [];
  for (let i = 0; i < numStars; i++) {
    stars.push({
      x: random(-width / 2, width / 2),
      y: random(-height / 2, height / 2),
      z: random(starZRange),
      pz: random(starZRange), // Previous z for drawing trails
      speedFactor: random(0.5, 2) // Individual speed factor for variety
    });
  }

  // Update UI positions
  playPauseButton.style('left', '30px');
  playPauseButton.style('bottom', '30px');
  uploadInput.wrapper.style('right', '30px');
  uploadInput.wrapper.style('bottom', '30px');

  if (uploadInput.elt) {
    let wrapperRect = uploadInput.wrapper.elt.getBoundingClientRect();
    uploadInput.position(wrapperRect.left + scrollX, wrapperRect.top + scrollY);
  }

  lastInteractionTime = millis();
}

function isPointOverElement(p5Element) {
  if (p5Element && p5Element.elt) {
    let rect = p5Element.elt.getBoundingClientRect();
    return mouseX >= rect.left && mouseX <= rect.right && mouseY >= rect.top && mouseY <= rect.bottom;
  }
  return false;
}

function isOverUI() {
  let uiElements = [
    playPauseButton,
    uploadInput.wrapper
  ];

  for (let element of uiElements) {
    // Only check if element is currently displayed and interactive
    if (element && element.elt && element.elt.style.opacity > 0 && element.elt.style.pointerEvents !== 'none') {
      if (isPointOverElement(element)) {
        return true;
      }
    }
  }
  return false;
}

function isOverAnyP5Element() {
  let allP5Elements = [
    playPauseButton,
    uploadInput.wrapper
  ];

  for (let element of allP5Elements) {
    if (element && element.elt) {
      // Only consider if the element is actually visible and interactive
      if (element.elt.style.display !== 'none' && element.elt.style.pointerEvents !== 'none' && element.elt.style.visibility !== 'hidden') {
        let rect = element.elt.getBoundingClientRect();
        if (mouseX >= rect.left && mouseX <= rect.right && mouseY >= rect.top && mouseY <= rect.bottom) {
          return true;
        }
      }
    }
  }
  return false;
}

function mouseMoved() {
  lastInteractionTime = millis();
}

function touchMoved() {
  lastInteractionTime = millis();
  if (!isOverAnyP5Element()) {
    return false;
  }
  return true;
}
