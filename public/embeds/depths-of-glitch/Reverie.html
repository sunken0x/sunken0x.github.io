                nodes[r] = [];
                let x = fixedLineX * (canvasSize / 1000);
                let y = map(r, 0, numRows - 1, fixedLineStartY, fixedLineEndY) * (canvasSize / 1000);
                nodes[r][0] = new Node(x, y);
            }

            currentColor = color(color1);
        }

        function draw() {
            background('#000a25');

            let imgSize = canvasSize;
            if (backgroundImage) {
                image(backgroundImage, width / 2, height / 2, imgSize, imgSize);
            }
            
            if (millis() - lastColorChangeTime > colorChangeInterval) {
                if (currentColor.toString() === color(color1).toString()) {
                    currentColor = color(color2);
                } else {
                    currentColor = color(color1);
                }
                lastColorChangeTime = millis();
            }

            if (frameCount % 9 < 6) {
                for (let r = 0; r < numRows; r++) {
                    let node = nodes[r][0];

                    node.x = node.initialX;
                    node.y = node.initialY;
                    node.vx = 0;
                    node.vy = 0;
                }

                noFill();
                strokeWeight(3);

                stroke(currentColor);
                drawMesh(0, 0);
            }

            if (foregroundImage) {
                image(foregroundImage, width / 2, height / 2, imgSize, imgSize);
            }
        }

        function drawMesh(offsetX, offsetY) {
            for (let r = 0; r < numRows; r++) {
                let node = nodes[r][0];

                let smokeTime = frameCount * 0.02;
                let smokeY = (r / numRows) * 4 + smokeTime;
                
                let glitchX1 = noise(smokeY * 2, frameCount * 0.01) * 2 - 1;
                let glitchX2 = noise(smokeY * 8, frameCount * 0.03 + 100) * 2 - 1;
                let glitchX3 = noise(smokeY * 20, frameCount * 0.05 + 200) * 2 - 1;
                
                let finalGlitchX = (glitchX1 * 15 + glitchX2 * 8 + glitchX3 * 3) * (canvasSize / 1000);
                
                let horizontalVariation = sin(smokeY * 3 + frameCount * 0.01) * 5 * (canvasSize / 1000);
                
                if (r < numRows - 1) {
                    let nextNode = nodes[r + 1][0];
                    
                    let nextSmokeY = ((r + 1) / numRows) * 4 + smokeTime;
                    let nextGlitchX1 = noise(nextSmokeY * 2, frameCount * 0.01) * 2 - 1;
                    let nextGlitchX2 = noise(nextSmokeY * 8, frameCount * 0.03 + 100) * 2 - 1;
                    let nextGlitchX3 = noise(nextSmokeY * 20, frameCount * 0.05 + 200) * 2 - 1;
                    let nextFinalGlitchX = (nextGlitchX1 * 15 + nextGlitchX2 * 8 + nextGlitchX3 * 3) * (canvasSize / 1000);
                    let nextHorizontalVariation = sin(nextSmokeY * 3 + frameCount * 0.01) * 5 * (canvasSize / 1000);
                    
                    line(
                        node.initialX + finalGlitchX + horizontalVariation,
                        node.initialY,
                        nextNode.initialX + nextFinalGlitchX + nextHorizontalVariation,
                        nextNode.initialY
                    );
                }
            }
        }

        class Node {
            constructor(x, y) {
                this.initialX = x; 
                this.initialY = y;
                this.targetX = x;
                this.targetY = y;
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.ax = 0;
                this.ay = 0;
                this._cachedNoiseX = 0;
                this._cachedNoiseY = 0;
            }

            update() {
                let fx = (this.targetX - this.x) * springConstant;
                let fy = (this.targetY - this.y) * springConstant;

                this.ax += fx;
                this.ay += fy;

                this.vx += this.ax;
                this.vy += this.ay;

                this.vx *= damping;
                this.vy *= damping;

                this.x += this.vx;
                this.y += this.vy;

                this.ax = 0;
                this.ay = 0;

                let displacement = dist(this.x, this.y, this.targetX, this.targetY);
                if (displacement > maxDisplacement) {
                    let angle = atan2(this.y - this.targetY, this.x - this.targetX);
                    this.x = this.targetX + cos(angle) * maxDisplacement;
                    this.y = this.targetY + sin(angle) * maxDisplacement;
                    this.vx *= 0.5;
                    this.vy *= 0.5;
                }
            }
        }

        function windowResized() {
            let isFullscreen = windowWidth >= screen.width && windowHeight >= screen.height;
            let newCanvasSize = isFullscreen ? 1000 : min(1000, min(windowWidth, windowHeight));
            
            if (newCanvasSize !== canvasSize) {
                canvasSize = newCanvasSize;
                resizeCanvas(canvasSize, canvasSize);
            }
            
            select('canvas').position(max(0, (windowWidth - canvasSize) / 2), max(0, (windowHeight - canvasSize) / 2));
            
            nodeSpacing = contentSize / (numRows + 1);

            for (let r = 0; r < numRows; r++) {
                let x = fixedLineX * (canvasSize / 1000);
                let y = map(r, 0, numRows - 1, fixedLineStartY, fixedLineEndY) * (canvasSize / 1000);
                nodes[r][0].initialX = x;
                nodes[r][0].initialY = y;
                nodes[r][0].targetX = x;
                nodes[r][0].targetY = y;
                nodes[r][0].x = x;
                nodes[r][0].y = y;
                nodes[r][0].vx = 0;
                nodes[r][0].vy = 0;
                nodes[r][0]._cachedNoiseX = 0;
                nodes[r][0]._cachedNoiseY = 0;
            }
        }
    </script>
</body>
