        function init() {
            try {

        function createGlitchWhirlpool() {
            if (glitchWhirlpool) {
                scene.remove(glitchWhirlpool);
            }
            
            const whirlpoolGeometry = new THREE.BufferGeometry();
            const whirlpoolVertices = [];
            const whirlpoolColors = [];
            
            // Create horizontal disk of glitch particles
            for (let i = 0; i < whirlpoolSettings.particleCount; i++) {
                const radius = Math.random() * whirlpoolSettings.radius;
                const angle = Math.random() * Math.PI * 2;
                const spiralOffset = (radius / whirlpoolSettings.radius) * Math.PI * 2;
                
                const x = Math.cos(angle + spiralOffset) * radius + (Math.random() - 0.5) * 10;
                const y = whirlpoolSettings.height + (Math.random() - 0.5) * whirlpoolSettings.thickness;
                const z = Math.sin(angle + spiralOffset) * radius + (Math.random() - 0.5) * 10;
                
                whirlpoolVertices.push(x, y, z);
                
                // Only use your defined colors
                let glitchColor;
                if (Math.random() > 0.5) {
                    glitchColor = new THREE.Color(colors.primary);
                } else {
                    glitchColor = new THREE.Color(colors.secondary);
                }
                
                whirlpoolColors.push(glitchColor.r, glitchColor.g, glitchColor.b);
            }
            
            whirlpoolGeometry.setAttribute('position', new THREE.Float32BufferAttribute(whirlpoolVertices, 3));
            whirlpoolGeometry.setAttribute('color', new THREE.Float32BufferAttribute(whirlpoolColors, 3));
            
            const whirlpoolMaterial = new THREE.PointsMaterial({
                size: Math.random() * 2 + 0.5,
                transparent: true,
                opacity: 0.9,
                vertexColors: true,
                blending: THREE.AdditiveBlending
            });
            
            glitchWhirlpool = new THREE.Points(whirlpoolGeometry, whirlpoolMaterial);
            scene.add(glitchWhirlpool);
        }

            const whirlpoolZ = 0;
            
            // Create a background plane with hole
            const shape = new THREE.Shape();
            shape.absarc(0, 0, gridSize, 0, Math.PI * 2, false);
            const hole = new THREE.Path();
            hole.absarc(whirlpoolX, whirlpoolZ, holeRadius, 0, Math.PI * 2, true);
            shape.holes.push(hole);
            
            const backgroundGeometry = new THREE.ShapeGeometry(shape);
            const backgroundMaterial = new THREE.MeshBasicMaterial({
                color: new THREE.Color(colors.background),
                side: THREE.DoubleSide
            });
            backgroundPlane = new THREE.Mesh(backgroundGeometry, backgroundMaterial);
            backgroundPlane.rotation.x = -Math.PI / 2;
            backgroundPlane.position.y = gridSettings.height - 0.1;
            scene.add(backgroundPlane);
            
            // Create horizontal grid lines with hole
            for (let i = 0; i <= divisions; i++) {
                const z = (i - divisions/2) * step;
                const distanceFromHoleCenter = Math.abs(z - whirlpoolZ);
                
                if (distanceFromHoleCenter < holeRadius) {
                    // Line intersects hole - create two segments
                    const holeLeft = whirlpoolX - Math.sqrt(holeRadius * holeRadius - (z - whirlpoolZ) * (z - whirlpoolZ));
                    const holeRight = whirlpoolX + Math.sqrt(holeRadius * holeRadius - (z - whirlpoolZ) * (z - whirlpoolZ));
                    
                    // Left segment
                    if (holeLeft > -gridSize/2) {
                        const leftGeometry = new THREE.BufferGeometry();
                        const leftPoints = [
                            new THREE.Vector3(-gridSize/2, gridSettings.height, z),
                            new THREE.Vector3(holeLeft, gridSettings.height, z)
                        ];
                        leftGeometry.setFromPoints(leftPoints);
                        
                        const leftMaterial = new THREE.LineBasicMaterial({ 
                            color: new THREE.Color(currentColor),
                            transparent: true,
                            opacity: opacity
                        });
                        gridMaterials.push(leftMaterial);
                        
                        const leftLine = new THREE.Line(leftGeometry, leftMaterial);
                        gridGroup.add(leftLine);
                    }
                    
                    // Right segment
                    if (holeRight < gridSize/2) {
                        const rightGeometry = new THREE.BufferGeometry();
                        const rightPoints = [
                            new THREE.Vector3(holeRight, gridSettings.height, z),
                            new THREE.Vector3(gridSize/2, gridSettings.height, z)
                        ];
                        rightGeometry.setFromPoints(rightPoints);
                        
                        const rightMaterial = new THREE.LineBasicMaterial({ 
                            color: new THREE.Color(currentColor),
                            transparent: true,
                            opacity: opacity
                        });
                        gridMaterials.push(rightMaterial);
                        
                        const rightLine = new THREE.Line(rightGeometry, rightMaterial);
                        gridGroup.add(rightLine);
                    }
                } else {
                    // Normal line - doesn't intersect hole
                    const geometry = new THREE.BufferGeometry();
                    const points = [
                        new THREE.Vector3(-gridSize/2, gridSettings.height, z),
                        new THREE.Vector3(gridSize/2, gridSettings.height, z)
                    ];
                    geometry.setFromPoints(points);
                    
                    const material = new THREE.LineBasicMaterial({ 
                        color: new THREE.Color(currentColor),
                        transparent: true,
                        opacity: opacity
                    });
                    gridMaterials.push(material);
                    
                    const line = new THREE.Line(geometry, material);
                    gridGroup.add(line);
                }
            }
            
            // Create vertical grid lines with hole
            for (let i = 0; i <= divisions; i++) {
                const x = (i - divisions/2) * step;
                const distanceFromHoleCenter = Math.abs(x - whirlpoolX);
                
                if (distanceFromHoleCenter < holeRadius) {
                    // Line intersects hole - create two segments
                    const holeTop = whirlpoolZ + Math.sqrt(holeRadius * holeRadius - (x - whirlpoolX) * (x - whirlpoolX));
                    const holeBottom = whirlpoolZ - Math.sqrt(holeRadius * holeRadius - (x - whirlpoolX) * (x - whirlpoolX));
                    
                    // Bottom segment
                    if (holeBottom > -gridSize/2) {
                        const bottomGeometry = new THREE.BufferGeometry();
                        const bottomPoints = [
                            new THREE.Vector3(x, gridSettings.height, -gridSize/2),
                            new THREE.Vector3(x, gridSettings.height, holeBottom)
                        ];
                        bottomGeometry.setFromPoints(bottomPoints);
                        
                        const bottomMaterial = new THREE.LineBasicMaterial({ 
                            color: new THREE.Color(currentColor),
                            transparent: true,
                            opacity: opacity
                        });
                        gridMaterials.push(bottomMaterial);
                        
                        const bottomLine = new THREE.Line(bottomGeometry, bottomMaterial);
                        gridGroup.add(bottomLine);
                    }
                    
                    // Top segment
                    if (holeTop < gridSize/2) {
                        const topGeometry = new THREE.BufferGeometry();
                        const topPoints = [
                            new THREE.Vector3(x, gridSettings.height, holeTop),
                            new THREE.Vector3(x, gridSettings.height, gridSize/2)
                        ];
                        topGeometry.setFromPoints(topPoints);
                        
                        const topMaterial = new THREE.LineBasicMaterial({ 
                            color: new THREE.Color(currentColor),
                            transparent: true,
                            opacity: opacity
                        });
                        gridMaterials.push(topMaterial);
                        
                        const topLine = new THREE.Line(topGeometry, topMaterial);
                        gridGroup.add(topLine);
                    }
                } else {
                    // Normal line - doesn't intersect hole
                    const geometry = new THREE.BufferGeometry();
                    const points = [
                        new THREE.Vector3(x, gridSettings.height, -gridSize/2),
                        new THREE.Vector3(x, gridSettings.height, gridSize/2)
                    ];
                    geometry.setFromPoints(points);
                    
                    const material = new THREE.LineBasicMaterial({ 
                        color: new THREE.Color(currentColor),
                        transparent: true,
                        opacity: opacity
                    });
                    gridMaterials.push(material);
                    
                    const line = new THREE.Line(geometry, material);
                    gridGroup.add(line);
                }
            }
            
            // Create hole edge - circular outline
            const holeGeometry = new THREE.RingGeometry(holeRadius - 0.5, holeRadius, 32);
            const holeMaterial = new THREE.MeshBasicMaterial({
                color: new THREE.Color(currentColor),
                transparent: true,
                opacity: opacity * 1.5,
                side: THREE.DoubleSide
            });
            gridMaterials.push(holeMaterial);
            
            const holeEdge = new THREE.Mesh(holeGeometry, holeMaterial);
            holeEdge.rotation.x = -Math.PI / 2;
            holeEdge.position.set(whirlpoolX, gridSettings.height + 0.01, whirlpoolZ);
            gridGroup.add(holeEdge);
        }

        function createGlobeGrid() {
            if (globeGrid) {
                scene.remove(globeGrid);
            }

            globeGrid = new THREE.Group();

            const material = new THREE.LineBasicMaterial({ 
                color: new THREE.Color(colors.primary),
                transparent: true,
                opacity: globeGridSettings.lineOpacity,
                blending: THREE.AdditiveBlending
            });
            gridMaterials.push(material);

            // Latitudinal lines
            for (let i = 0; i <= globeGridSettings.divisions; i++) {
                const lat = (i / globeGridSettings.divisions) * Math.PI;
                const radiusAtLat = globeGridSettings.radius * Math.sin(lat);
                const y = globeGridSettings.radius * Math.cos(lat);

                const points = [];
                for (let j = 0; j <= globeGridSettings.divisions * 2; j++) {
                    const lon = (j / (globeGridSettings.divisions * 2)) * Math.PI * 2;
                    points.push(new THREE.Vector3(Math.cos(lon) * radiusAtLat, y, Math.sin(lon) * radiusAtLat));
                }
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                globeGrid.add(new THREE.LineLoop(geometry, material));
            }

            // Longitudinal lines
            for (let i = 0; i <= globeGridSettings.divisions * 2; i++) {
                const lon = (i / (globeGridSettings.divisions * 2)) * Math.PI * 2;
                const points = [];
                for (let j = 0; j <= globeGridSettings.divisions; j++) {
                    const lat = (j / globeGridSettings.divisions) * Math.PI;
                    const x = globeGridSettings.radius * Math.sin(lat) * Math.cos(lon);
                    const y = globeGridSettings.radius * Math.sin(lat) * Math.sin(lon);
                    const z = globeGridSettings.radius * Math.cos(lat);
                    points.push(new THREE.Vector3(x, y, z));
                }
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                globeGrid.add(new THREE.Line(geometry, material));
            }

            // Glitching particles for the globe grid
            const particleGeometry = new THREE.BufferGeometry();
            const particleVertices = [];
            const particleColors = [];

            for (let i = 0; i < globeGridSettings.particleCount; i++) {
                const phi = Math.acos(2 * Math.random() - 1);
                const theta = Math.random() * Math.PI * 2;

                const x = globeGridSettings.radius * Math.sin(phi) * Math.cos(theta);
                const y = globeGridSettings.radius * Math.sin(phi) * Math.sin(theta);
                const z = globeGridSettings.radius * Math.cos(phi);

                particleVertices.push(x, y, z);
                
                // Only use your defined colors
                const glitchColor = Math.random() > 0.5 ? 
                    new THREE.Color(colors.primary) : 
                    new THREE.Color(colors.secondary);
                
                particleColors.push(glitchColor.r, glitchColor.g, glitchColor.b);
            }

            particleGeometry.setAttribute('position', new THREE.Float32BufferAttribute(particleVertices, 3));
            particleGeometry.setAttribute('color', new THREE.Float32BufferAttribute(particleColors, 3));

            const particleMaterial = new THREE.PointsMaterial({
                size: 0.8,
                transparent: true,
                opacity: 0.7,
                vertexColors: true,
                blending: THREE.AdditiveBlending
            });
            gridMaterials.push(particleMaterial);

            const globeParticles = new THREE.Points(particleGeometry, particleMaterial);
            globeGrid.add(globeParticles);
            globeGrid.particles = globeParticles;

            scene.add(globeGrid);
        }

        function setupOverlay() {
            if (base64Overlay && base64Overlay.length > 0) {
                if (!overlayElement) {
                    overlayElement = document.createElement('div');
                    overlayElement.style.position = 'absolute';
                    overlayElement.style.top = '50%';
                    overlayElement.style.left = '50%';
                    overlayElement.style.transform = 'translate(-50%, -50%)';
                    overlayElement.style.zIndex = '20';
                    overlayElement.style.pointerEvents = 'none';
                    document.body.appendChild(overlayElement);
                }
                
                const existingImg = overlayElement.querySelector('img');
                if (existingImg) {
                    overlayElement.removeChild(existingImg);
                }
                
                const img = document.createElement('img');
                img.src = base64Overlay.startsWith('data:') ? base64Overlay : 'data:image/svg+xml;base64,' + base64Overlay;
                
                const minDimension = Math.min(window.innerWidth, window.innerHeight);
                img.style.width = minDimension + 'px';
                img.style.height = minDimension + 'px';
                img.style.objectFit = 'contain';
                
                overlayElement.appendChild(img);
            }
        }

        function updateColors() {
            const currentTime = Date.now();
            if (currentTime - lastColorChange > colorChangeInterval) {
                currentColor = currentColor === colors.primary ? colors.secondary : colors.primary;
                lastColorChange = currentTime;
                
                for (let i = 0; i < gridMaterials.length; i++) {
                    if (gridMaterials[i] && gridMaterials[i].color) {
                        gridMaterials[i].color.set(currentColor);
                    }
                }
            }
        }

        function onWindowResize() {
            camera.aspect = 1;
            camera.updateProjectionMatrix();
            
            const minDimension = Math.min(window.innerWidth, window.innerHeight);
            renderer.setSize(minDimension, minDimension);
            
            const container = renderer.domElement.parentElement;
            if (container) {
                container.style.width = minDimension + 'px';
                container.style.height = minDimension + 'px';
            }
            
            setupOverlay();
        }

        function animate() {
            try {
                requestAnimationFrame(animate);
                
                const delta = clock.getDelta();
                animationTime += delta;
                
                // Animate whirlpool
                if (glitchWhirlpool) {
                    glitchWhirlpool.rotation.y += globalSpinSpeed;
                    
                    const positions = glitchWhirlpool.geometry.attributes.position.array;
                    const whirlpoolColors = glitchWhirlpool.geometry.attributes.color.array;
                    const glitchChance = 0.995 - (whirlpoolSettings.glitchIntensity * 0.001);
                    
                    for (let i = 0; i < positions.length; i += 30) {
                        if (Math.random() > glitchChance) {
                            positions[i] += (Math.random() - 0.5) * whirlpoolSettings.glitchIntensity;
                            positions[i + 1] += (Math.random() - 0.5) * (whirlpoolSettings.glitchIntensity * 0.5);
                            positions[i + 2] += (Math.random() - 0.5) * whirlpoolSettings.glitchIntensity;
                            
                            const colorChoice = Math.random() > 0.5 ? new THREE.Color(colors.primary) : new THREE.Color(colors.secondary);
                            whirlpoolColors[i] = colorChoice.r;
                            whirlpoolColors[i + 1] = colorChoice.g;
                            whirlpoolColors[i + 2] = colorChoice.b;
                        }
                    }
                    glitchWhirlpool.geometry.attributes.position.needsUpdate = true;
                    glitchWhirlpool.geometry.attributes.color.needsUpdate = true;
                }

                // Animate globe grid
                if (globeGrid) {
                    globeGrid.rotation.y += globalSpinSpeed;
                    globeGrid.rotation.x += globalSpinSpeed * 0.2;

                    if (globeGrid.particles) {
                        const positions = globeGrid.particles.geometry.attributes.position.array;
                        const globeColors = globeGrid.particles.geometry.attributes.color.array;
                        const glitchChance = 0.99 - (globeGridSettings.glitchIntensity * 0.001);
                        
                        for (let i = 0; i < positions.length; i += 3) {
                            if (Math.random() > glitchChance) {
                                positions[i] += (Math.random() - 0.5) * globeGridSettings.glitchIntensity * 2;
                                positions[i + 1] += (Math.random() - 0.5) * globeGridSettings.glitchIntensity * 2;
                                positions[i + 2] += (Math.random() - 0.5) * globeGridSettings.glitchIntensity * 2;
                                
                                const colorChoice = Math.random() > 0.5 ? new THREE.Color(colors.primary) : new THREE.Color(colors.secondary);
                                globeColors[i] = colorChoice.r;
                                globeColors[i + 1] = colorChoice.g;
                                globeColors[i + 2] = colorChoice.b;
                            }
                        }
                        globeGrid.particles.geometry.attributes.position.needsUpdate = true;
                        globeGrid.particles.geometry.attributes.color.needsUpdate = true;
                    }
                }
                
                updateColors();
                renderer.render(scene, camera);
                
            } catch (error) {
                console.error('Animation error:', error);
            }
        }

        // Global function to update base64 overlay
        window.updateBase64SVG = function(base64String) {
            base64Overlay = base64String;
            setupOverlay();
        }
    </script>
</body>
