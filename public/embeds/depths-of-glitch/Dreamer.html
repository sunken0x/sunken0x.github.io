        let overlayImage;

        function preload() {
            if (base64OverlayImage && base64OverlayImage.length > 0) {
                overlayImage = loadImage(base64OverlayImage);
            }
        }

        function setup() {
            // Make canvas fit window properly
            canvasSize = min(windowWidth, windowHeight) * 0.9;
            let cnv = createCanvas(canvasSize, canvasSize);
            
            // Center in window
            cnv.position((windowWidth - canvasSize) / 2, (windowHeight - canvasSize) / 2);
            
            // Remove border and styling
            cnv.elt.style.border = 'none';
            cnv.elt.style.outline = 'none';
            cnv.elt.style.boxShadow = 'none';
            cnv.elt.style.margin = '0';
            cnv.elt.style.padding = '0';
            
            document.body.style.backgroundColor = '#000a25';
            
            centerX = canvasSize / 2;
            centerY = canvasSize / 2;
            
            // Set image mode for overlay
            imageMode(CENTER);
            
            // Grid setup
            nodeSpacing = contentSize / (numCols + 1);
            if (nodeSpacing > contentSize / (numRows + 1)) {
                nodeSpacing = contentSize / (numRows + 1);
            }

            for (let r = 0; r < numRows; r++) {
                nodes[r] = [];
                for (let c = 0; c < numCols; c++) {
                    let x = map(c, 0, numCols - 1, margin + nodeSpacing * 1.5, margin + contentSize - nodeSpacing * 1.5) * (canvasSize / 1000);
                    let y = map(r, 0, numRows - 1, margin + nodeSpacing * 1.5, margin + contentSize - nodeSpacing * 1.5) * (canvasSize / 1000);
                    nodes[r][c] = new Node(x, y);
                }
            }

            currentColor = color(color1);
            
            // Setup click to toggle
            document.addEventListener('click', toggleAudio);
            
            // Auto-start piano
            startPiano();
        }

        function toggleAudio() {
            if (pianoPlaying) {
                stopPiano();
            } else {
                startPiano();
            }
        }

        function startPiano() {
            if (pianoPlaying) return;
            
            setupAudioContext().then(() => {
                pianoPlaying = true;
                isPlaying = true;
                playHauntingPiano();
            });
        }

        function setupAudioContext() {
            return new Promise((resolve) => {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                analyser.smoothingTimeConstant = 0.8;
                frequencyData = new Uint8Array(analyser.frequencyBinCount);
                
                // Create high-pass filter to reduce bass - set to 150Hz
                highPassFilter = audioContext.createBiquadFilter();
                highPassFilter.type = 'highpass';
                highPassFilter.frequency.setValueAtTime(150, audioContext.currentTime);
                highPassFilter.Q.setValueAtTime(1, audioContext.currentTime);
                
                // Connect filter to analyser and destination
                highPassFilter.connect(analyser);
                analyser.connect(audioContext.destination);
                
                if (audioContext.state === 'suspended') {
                    audioContext.resume().then(resolve);
                } else {
                    resolve();
                }
            });
        }

        function playHauntingPiano() {
            if (!pianoPlaying) return;

            // Haunting chord progression - 15% faster with more notes
            const chords = [
                [220, 261.63, 329.63, 392],      // Am + G
                [174.61, 220, 261.63, 329.63],  // F + E
                [196, 246.94, 293.66, 349.23],  // G + F
                [164.81, 196, 246.94, 293.66],  // Em + D
                [146.83, 174.61, 220, 261.63],  // Dm + C
                [196, 246.94, 293.66, 392],     // G + G
                [220, 261.63, 329.63, 440],     // Am + A
                [174.61, 220, 261.63, 349.23],  // F + F
                [164.81, 196, 246.94, 329.63]   // Em + E
            ];

            let chordIndex = 0;

            function playChord() {
                if (!pianoPlaying) return;

                const chord = chords[chordIndex];
                
                chord.forEach((freq, i) => {
                    setTimeout(() => {
                        if (!pianoPlaying) return;
                        
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        
                        osc.connect(gain);
                        gain.connect(highPassFilter);
                        
                        osc.frequency.setValueAtTime(freq, audioContext.currentTime);
                        osc.type = 'sine';
                        
                        // Piano envelope
                        gain.gain.setValueAtTime(0, audioContext.currentTime);
                        gain.gain.linearRampToValueAtTime(0.08, audioContext.currentTime + 0.1);
                        gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 3.5);
                        
                        osc.start();
                        osc.stop(audioContext.currentTime + 3.5);
                        
                        pianoOscillators.push(osc);
                        pianoGains.push(gain);
                        
                        // Add high harmonic occasionally for treble glitch
                        if (i === chord.length - 1 && Math.random() < 0.5) {
                            setTimeout(() => {
                                if (!pianoPlaying) return;
                                
                                const harmOsc = audioContext.createOscillator();
                                const harmGain = audioContext.createGain();
                                
                                harmOsc.connect(harmGain);
                                harmGain.connect(highPassFilter);
                                
                                harmOsc.frequency.setValueAtTime(freq * 4, audioContext.currentTime);
                                harmOsc.type = 'sine';
                                
                                harmGain.gain.setValueAtTime(0, audioContext.currentTime);
                                harmGain.gain.linearRampToValueAtTime(0.015, audioContext.currentTime + 0.05);
                                harmGain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.6);
                                
                                harmOsc.start();
                                harmOsc.stop(audioContext.currentTime + 0.6);
                                
                                pianoOscillators.push(harmOsc);
                                pianoGains.push(harmGain);
                            }, 300 + Math.random() * 400);
                        }
                    }, i * 60); // Faster note delays
                });

                chordIndex = (chordIndex + 1) % chords.length;
                
                const nextDelay = 2500 + Math.random() * 1500; // Much slower, 3.5-6 second gaps
                setTimeout(playChord, nextDelay);
            }

            playChord();
        }

        function stopPiano() {
            pianoPlaying = false;
            isPlaying = false;
            
            // Clear all timeouts to prevent overlapping songs
            chordTimeouts.forEach(timeout => clearTimeout(timeout));
            chordTimeouts = [];
            
            // Stop all oscillators
            pianoOscillators.forEach(osc => {
                try { 
                    osc.stop(); 
                    osc.disconnect();
                } catch(e) {}
            });
            pianoGains.forEach(gain => {
                try { 
                    gain.disconnect(); 
                } catch(e) {}
            });
            pianoOscillators = [];
            pianoGains = [];
            
            // Reset levels
            smoothedBass = 0;
            smoothedTreble = 0;
            
            // Close audio context to fully reset
            if (audioContext) {
                audioContext.close().then(() => {
                    audioContext = null;
                });
            }
        }

        function analyzeAudio() {
            if (!analyser || !frequencyData || !isPlaying) {
                return;
            }
            
            analyser.getByteFrequencyData(frequencyData);
            
            // Simple bass/treble separation
            let bassSum = 0, trebleSum = 0;
            let bassCount = 0, trebleCount = 0;
            
            for (let i = 0; i < frequencyData.length; i++) {
                const freq = (i / frequencyData.length) * (audioContext.sampleRate / 2);
                const amplitude = frequencyData[i] / 255;
                
                if (freq < 400) { // Bass/low-mid
                    bassSum += amplitude;
                    bassCount++;
                } else if (freq > 2000) { // High frequencies for glitch
                    trebleSum += amplitude;
                    trebleCount++;
                }
            }
            
            bassLevel = bassCount > 0 ? bassSum / bassCount : 0;
            trebleLevel = trebleCount > 0 ? trebleSum / trebleCount : 0;
            
            // Very smooth interpolation with reduced bass power
            smoothedBass = lerp(smoothedBass, bassLevel * 0.85, 0.05); // Reduced bass by 15%
            smoothedTreble = lerp(smoothedTreble, trebleLevel, 0.1);
        }

        function draw() {
            analyzeAudio();
            
            background('#000a25');
            
            // Update wave time with minimal bass influence
            waveTime += waveSpeed + smoothedBass * 0.01;
            
            // Color changes
            if (smoothedBass > 0.05 && millis() - lastColorChange > 150) {
                currentColor = currentColor.toString() === color(color1).toString() ? color(color2) : color(color1);
                lastColorChange = millis();
            }

            // Update nodes with smooth circular waves + audio reactivity
            for (let r = 0; r < numRows; r++) {
                for (let c = 0; c < numCols; c++) {
                    let node = nodes[r][c];
                    
                    // Distance from center for wave effect
                    let distFromCenter = dist(node.initialX, node.initialY, centerX, centerY);
                    
                    // Main circular wave
                    let wavePhase = (distFromCenter * 0.02) - waveTime;
                    let waveHeight = sin(wavePhase) * waveAmplitude * (1 + smoothedBass * 0.8);
                    
                    // Direction from center
                    let dirX = (node.initialX - centerX) / distFromCenter;
                    let dirY = (node.initialY - centerY) / distFromCenter;
                    
                    // Apply smooth wave for bass
                    node.targetX = node.initialX + dirX * waveHeight * 0.25;
                    node.targetY = node.initialY + dirY * waveHeight * 0.25;
                    
                    node.update();
                }
            }

            // Draw clean grid
            noFill();
            strokeWeight(1 + smoothedBass * 1.5);
            stroke(currentColor);
            
            drawMesh();
            
            // Draw overlay image on top
            if (overlayImage) {
                image(overlayImage, width / 2, height / 2, canvasSize, canvasSize);
            }
        }

        function drawMesh() {
            for (let r = 0; r < numRows; r++) {
                for (let c = 0; c < numCols; c++) {
                    let node = nodes[r][c];
                    
                    if (r < numRows - 1) {
                        let nextNode = nodes[r + 1][c];
                        
                        // Normal smooth line for bass
                        line(node.x, node.y, nextNode.x, nextNode.y);
                        
                        // HIGH PITCH = JAGGED REACTOR GLITCH LINES
                        if (smoothedTreble > 0.05 && random() < smoothedTreble * 0.8) {
                            // Create jagged, broken line segments
                            let segments = 3 + floor(smoothedTreble * 5);
                            
                            stroke(255, 100, 255, 150); // Bright magenta glitch color
                            strokeWeight(1 + smoothedTreble * 3);
                            
                            let startX = node.x;
                            let startY = node.y;
                            let endX = nextNode.x;
                            let endY = nextNode.y;
                            
                            for (let s = 0; s < segments; s++) {
                                let progress1 = s / segments;
                                let progress2 = (s + 1) / segments;
                                
                                let x1 = lerp(startX, endX, progress1);
                                let y1 = lerp(startY, endY, progress1);
                                let x2 = lerp(startX, endX, progress2);
                                let y2 = lerp(startY, endY, progress2);
                                
                                // Add sharp jagged offsets - like electrical discharge
                                let offset = smoothedTreble * 20;
                                x1 += random(-offset, offset);
                                y1 += random(-offset, offset);
                                x2 += random(-offset, offset);
                                y2 += random(-offset, offset);
                                
                                line(x1, y1, x2, y2);
                            }
                            
                            // Reset stroke for normal lines
                            stroke(currentColor);
                            strokeWeight(1 + smoothedBass * 1.5);
                        }
                    }
                }
            }
        }

        class Node {
            constructor(x, y) {
                this.initialX = x; 
                this.initialY = y;
                this.targetX = x;
                this.targetY = y;
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
            }

            update() {
                let springConstant = 0.08 + smoothedBass * 0.02;
                let damping = 0.88;
                
                let fx = (this.targetX - this.x) * springConstant;
                let fy = (this.targetY - this.y) * springConstant;

                this.vx += fx;
                this.vy += fy;

                this.vx *= damping;
                this.vy *= damping;

                this.x += this.vx;
                this.y += this.vy;
            }
        }

        function windowResized() {
            let newCanvasSize = min(windowWidth, windowHeight) * 0.9;
            
            if (newCanvasSize !== canvasSize) {
                canvasSize = newCanvasSize;
                resizeCanvas(canvasSize, canvasSize);
                centerX = canvasSize / 2;
                centerY = canvasSize / 2;
            }
            
            select('canvas').position((windowWidth - canvasSize) / 2, (windowHeight - canvasSize) / 2);
            
            nodeSpacing = contentSize / (numCols + 1);
            if (nodeSpacing > contentSize / (numRows + 1)) {
                nodeSpacing = contentSize / (numRows + 1);
            }

            for (let r = 0; r < numRows; r++) {
                for (let c = 0; c < numCols; c++) {
                    let x = map(c, 0, numCols - 1, margin + nodeSpacing * 1.5, margin + contentSize - nodeSpacing * 1.5) * (canvasSize / 1000);
                    let y = map(r, 0, numRows - 1, margin + nodeSpacing * 1.5, margin + contentSize - nodeSpacing * 1.5) * (canvasSize / 1000);
                    nodes[r][c].initialX = x;
                    nodes[r][c].initialY = y;
                    nodes[r][c].targetX = x;
                    nodes[r][c].targetY = y;
                    nodes[r][c].x = x;
                    nodes[r][c].y = y;
                    nodes[r][c].vx = 0;
                    nodes[r][c].vy = 0;
                }
            }
        }
    </script>
</body>
