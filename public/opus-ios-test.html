const out=document.getElementById('out');
V.forEach((v,i)=>{
  const d=document.createElement('div'); d.className='row';
  d.innerHTML='<b>'+v.name+'</b> <span id="r'+i+'">…</span><br><button onclick="go('+i+')">TEST</button>';

function buf(b64){const s=atob(b64);const a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a.buffer;}
async function go(i){
  const r=document.getElementById('r'+i); r.textContent='decoding…'; r.className='';
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    await ctx.resume();
    const ab=await ctx.decodeAudioData(buf(V[i].b64));
    const src=ctx.createBufferSource(); src.buffer=ab; src.connect(ctx.destination); src.start();
    r.textContent='PASS — '+ab.duration.toFixed(2)+'s decoded & playing'; r.className='ok';
  }catch(e){ r.textContent='FAIL — '+(e&&e.message||e); r.className='bad'; }
}
